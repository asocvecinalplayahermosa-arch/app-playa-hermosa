function cargarPerfilSocio() {
  const usuario = localStorage.getItem('currentUser');
  const u = usuariosDB[usuario];
  const enSuspenso = tieneCausal(u);

  if (document.getElementById('profileName')) document.getElementById('profileName').textContent = `${u.nombre} ${u.segundoNombre || ''} ${u.apellido1 || ''} ${u.apellido2 || ''}`.replace(/\s+/g, ' ').trim();
  if (document.getElementById('profileTipoBadge')) document.getElementById('profileTipoBadge').textContent = u.tipoSocio || 'Socio';
  actualizarBotonNotificaciones();
  if (document.getElementById('profileStatus')) {
    const badge = document.getElementById('profileStatus');
    badge.textContent = enSuspenso ? '🔴 En suspenso' : '✅ Activo';
    badge.className = 'perfil-badge-estado ' + (enSuspenso ? 'perfil-badge-suspenso' : 'perfil-badge-activo');
  }
  if (document.getElementById('profileEmail')) document.getElementById('profileEmail').textContent = u.email || '-';
  if (document.getElementById('profileTelefono')) document.getElementById('profileTelefono').textContent = u.telefono || '-';
  if (document.getElementById('profileDireccion')) document.getElementById('profileDireccion').textContent = u.direccion || '-';
  if (document.getElementById('profileNacimiento')) {
    document.getElementById('profileNacimiento').textContent = u.fechaNacimiento
      ? new Date(u.fechaNacimiento + 'T00:00:00').toLocaleDateString('es-ES')
      : '-';
  }
  if (document.getElementById('profilePlan')) {
    const plan = PLANES_CUOTA[u.planCuota] || PLANES_CUOTA.individual;
    document.getElementById('profilePlan').textContent = `${plan.label} — $${plan.precioMensual}/mes`;
  }

  // Aviso de deuda / avisos pendientes (visible en Avisos)
  const avisoDiv = document.getElementById('avisoDeudaSocio');
  if (avisoDiv) {
    if (u.mesesEnDeuda > 0 || (u.historialAvisos || []).length > 0) {
      const ultimoAviso = (u.historialAvisos || []).length ? u.historialAvisos[u.historialAvisos.length - 1] : null;
      avisoDiv.innerHTML = `
        <div class="warning-box" style="margin-bottom: 20px;">
          ⚠️ <strong>Tenés una cuota social pendiente.</strong>
          ${u.mesesEnDeuda > 0 ? `\nMeses adeudados: ${u.mesesEnDeuda}` : ''}
          ${ultimoAviso ? `\n\nÚltimo aviso recibido (${new Date(ultimoAviso.fecha).toLocaleDateString('es-ES')}): ${ultimoAviso.mensaje}` : ''}
        </div>`;
    } else {
      avisoDiv.innerHTML = '';
    }
  }

  // Mis pagos
  const pagosDiv = document.getElementById('misPagosSocio');
  if (pagosDiv) {
    if ((u.historialPagos || []).length === 0) {
      pagosDiv.innerHTML = '<p style="color: var(--gray); font-size:13px;">Todavía no tenés pagos registrados</p>';
    } else {
      let html = `<table><thead><tr><th>Fecha</th><th>Concepto</th><th>Monto</th></tr></thead><tbody>`;
      u.historialPagos.slice().reverse().forEach(p => {
        const f = new Date(p.fecha + 'T00:00:00').toLocaleDateString('es-ES');
        const simboloMoneda = p.moneda === 'USD' ? 'US$' : '$';
        const montoTexto = p.cubiertoPorFamilia ? '👨‍👩‍👧 Familiar' : `${simboloMoneda}${p.monto.toFixed(2)}`;
        html += `<tr><td>${f}</td><td>${p.concepto}</td><td>${montoTexto}</td></tr>`;
      });
      html += `</tbody></table>`;
      pagosDiv.innerHTML = html;
    }
  }
}

function guardarEditarPerfilSocio() {
  const usuario = localStorage.getItem('currentUser');
  const u = usuariosDB[usuario];

  const nombre = document.getElementById('miNombre').value.trim();
  const segundoNombre = document.getElementById('miSegundoNombre').value.trim();
  const apellido1 = document.getElementById('miApellido1').value.trim();
  const apellido2 = document.getElementById('miApellido2').value.trim();
  const email = document.getElementById('miEmail').value.trim();
  const telefono = document.getElementById('miTelefono').value.trim();
  const direccion = document.getElementById('miDireccion').value.trim();
  const fechaNacimiento = document.getElementById('miFechaNacimiento').value;

  if (!nombre || !apellido1) {
    alert('El nombre y el primer apellido son obligatorios');
    return;
  }

  if (!email) {
    alert('El correo electrónico es obligatorio');
    return;
  }

  const otroConMismoEmail = emailYaUsadoPorOtro(email, usuario);
  if (otroConMismoEmail) {
    const u2 = usuariosDB[otroConMismoEmail];
    const continuar = confirm(`ℹ️ Ese email ya está registrado en otra cuenta: ${u2.nombre || otroConMismoEmail} (rol: ${u2.rol}).\n\nEsto es normal si sos la misma persona con otro rol en la app (por ejemplo, también profesor).\n\n¿Continuar y guardar igual?`);

  u.segundoNombre = segundoNombre;

  u.apellido2 = apellido2;
  u.email = email;
  u.telefono = telefono;

  document.querySelector('.modal-overlay').remove();
  cargarPerfilSocio();
  alert('✅ Tus datos fueron actualizados');
}

// ===== SOCIO: activar notificaciones push =====
async function activarNotificaciones() {
  if (!messaging) {
    alert('Tu navegador no soporta notificaciones push, o falta instalar la app. Probá instalarla desde el menú del navegador y volvé a intentar.');
    return;
  }

  try {
    const permiso = await Notification.requestPermission();
    if (permiso !== 'granted') {
      alert('No diste permiso para las notificaciones. Podés activarlas más tarde desde la configuración del sitio en tu navegador.');
      return;
    }

    const token = await messaging.getToken({ vapidKey: FCM_VAPID_KEY });
    if (!token) {
      alert('No se pudo generar el token de notificaciones. Intentá de nuevo en unos segundos.');
      return;
    }

    const usuario = localStorage.getItem('currentUser');
    const u = usuariosDB[usuario];
    if (!Array.isArray(u.fcmTokens)) u.fcmTokens = [];
    if (!u.fcmTokens.includes(token)) {
      u.fcmTokens.push(token);
      guardarTodo();
    }

    actualizarBotonNotificaciones();
    alert('✅ ¡Notificaciones activadas! Te vamos a avisar sobre noticias, eventos y novedades de tus reservas.');
  } catch (err) {
    console.error('Error activando notificaciones:', err);
    alert('❌ No se pudieron activar las notificaciones. Revisá que le hayas dado permiso al sitio en la configuración del navegador.');
  }
}

function actualizarBotonNotificaciones() {
  const btn = document.getElementById('btnActivarNotis');
  if (!btn) return;
  const usuario = localStorage.getItem('currentUser');
  const u = usuariosDB[usuario];
  const activas = u && Array.isArray(u.fcmTokens) && u.fcmTokens.length > 0;
  btn.textContent = activas ? '🔔 Notificaciones activadas' : '🔔 Activar notificaciones';
  btn.disabled = !!activas;
  btn.style.opacity = activas ? '0.7' : '1';
}

function cargarRecientesSocio() {
  const cont = document.getElementById('recientesListaSocio');
  if (!cont) return;

  const items = [
    ...eventosDB.map(e => ({ ...e, _tipo: 'evento' })),
    ...noticiasDB.map(n => ({ ...n, _tipo: 'noticia' })),
    ...flyersDB.map(f => ({ ...f, _tipo: 'flyer' }))
  ];

  if (items.length === 0) {
    cont.innerHTML = '<p style="color: var(--gray); font-size:13px;">No hay novedades por ahora</p>';
    return;
  }

  let html = '';
  recientesItemsCache = items;
  items.forEach((it, idx) => {
    const icono = it._tipo === 'evento' ? '📅' : (it._tipo === 'flyer' ? '🖼️' : '📢');
    const claseColor = it._tipo === 'evento' ? 're-icon-violeta' : (it._tipo === 'flyer' ? 're-icon-azul' : 're-icon-rosa');
    html += `<div class="recientes-item" onclick="abrirDetalleReciente(${idx})">
      <div class="recientes-icon ${claseColor}">${icono}</div>
      <div style="flex:1; min-width:0;">
        <p style="font-weight:700; font-size:13px; color: var(--navy);">${it.titulo}</p>
        <p style="font-size:11.5px; color: var(--gray);">${it._tipo === 'evento' ? 'Evento' : (it._tipo === 'flyer' ? 'Flyer de actividad' : 'Comunicado')}</p>
      </div>
      <span class="re-chevron">›</span>
    </div>`;
  });
  cont.innerHTML = html;
}

// Abre el detalle de un ítem de "Recientes": si tiene imagen (flyer o noticia con foto), la muestra ampliada;
// si es una noticia con link pero sin imagen, abre el link; si no, lleva a Documentos.
let recientesItemsCache = [];

function abrirDetalleReciente(idx) {
  const it = recientesItemsCache[idx];
  if (!it) return;

  if (it.imagen) {
    mostrarLightboxImagen(it.imagen, it.titulo, it.descripcion, it.link);
  } else if (it.link) {
    window.open(it.link, '_blank', 'noopener,noreferrer');
  } else {
    mostrarSeccionSocio('documentos');
  }
}

function mostrarLightboxImagen(imagen, titulo, descripcion, link) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="modal-content" style="padding:0; overflow:hidden;">
      <img src="${imagen}" style="width:100%; max-height:60vh; object-fit:contain; background:#07294A; display:block;">
      <div style="padding:18px;">
        <h2 style="margin-top:0; color: var(--navy);">${titulo}</h2>
        ${descripcion ? `<p style="color: var(--gray); font-size:14px; line-height:1.5;">${descripcion}</p>` : ''}
        ${link ? `<p><a href="${link}" target="_blank" rel="noopener noreferrer" style="color: var(--navy2); font-weight:600;">🔗 Ver fuente</a></p>` : ''}
        <button class="btn" style="background:#6c757d; margin-top:10px;" onclick="this.closest('.modal-overlay').remove()">Cerrar</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

let documentosCategoriaSeleccionada = null;

function cargarDocumentosSocio() {
  const cont = document.getElementById('documentosListaSocio');
  if (!cont) return;

  if (!documentosCategoriaSeleccionada) {
    // ===== Vista de categorías =====
    let html = '<div class="quick-actions" style="grid-template-columns: repeat(2, 1fr);">';
    Object.entries(CATEGORIAS_DOCUMENTO).forEach(([key, cat]) => {
      const cantidad = documentosDB.filter(d => d.categoria === key).length;
      html += `<button class="quick-action-tile" onclick="verCategoriaDocumento('${key}')">
        <span class="qa-icon">${cat.icono}</span>
        <span class="qa-label">${cat.label}</span>
        <span style="display:block; font-size:10px; color: var(--gray); margin-top:2px;">${cantidad} documento${cantidad === 1 ? '' : 's'}</span>
      </button>`;
    });
    html += '</div>';
    cont.innerHTML = html;
    return;
  }

  // ===== Vista de una categoría específica =====
  const cat = CATEGORIAS_DOCUMENTO[documentosCategoriaSeleccionada] || CATEGORIAS_DOCUMENTO.otros;
  const docsFiltrados = documentosDB.filter(d => d.categoria === documentosCategoriaSeleccionada)
    .sort((a, b) => (b.fecha || '').localeCompare(a.fecha || ''));

  const hoyISO = new Date().toISOString().split('T')[0];
  const fechaMasReciente = docsFiltrados.length ? docsFiltrados[0].fecha : null;
  const actualizadoTexto = fechaMasReciente === hoyISO ? 'Actualizado hoy'
    : fechaMasReciente ? `Actualizado el ${new Date(fechaMasReciente + 'T00:00:00').toLocaleDateString('es-ES')}`
    : 'Sin documentos todavía';

  let html = `<a class="oct-back-link" onclick="volverACategoriasDocumento()" style="color: var(--navy2);">← Categorías</a>
    <div class="doc-header-card">
      <h2>${cat.icono} ${cat.label}</h2>
      <p>${docsFiltrados.length} documento${docsFiltrados.length === 1 ? '' : 's'} · ${actualizadoTexto}</p>
    </div>`;

  if (docsFiltrados.length === 0) {
    html += '<p style="color: var(--gray); font-size:13px;">Todavía no hay documentos en esta categoría</p>';
  } else {
    docsFiltrados.forEach(doc => {
      const tipo = inferirTipoArchivo(doc.link);
      const fechaFormateada = doc.fecha ? new Date(doc.fecha + 'T00:00:00').toLocaleDateString('es-ES') : '';
      const esNuevo = doc.fecha && ((new Date(hoyISO) - new Date(doc.fecha)) / (1000 * 60 * 60 * 24)) <= 7;

      html += `<div class="doc-card" ${doc.link ? `onclick="window.open('${doc.link}','_blank')"` : ''}>
        ${esNuevo ? '<span class="doc-badge-nuevo">NUEVO</span>' : ''}
        <div class="doc-icon ${tipo.clase}">${tipo.icono}</div>
        <div class="doc-info">
          <p class="doc-titulo">${doc.titulo}</p>
          <p class="doc-fecha">${doc.descripcion ? doc.descripcion + ' · ' : ''}${fechaFormateada}</p>
        </div>
        ${doc.link ? `<span class="doc-badge-tipo">${tipo.etiqueta}</span>` : ''}
      </div>`;
    });
  }

  cont.innerHTML = html;
}

function inferirTipoArchivo(link) {
  const url = (link || '').toLowerCase();
  if (url.includes('.pdf')) return { clase: 'pdf', icono: '📕', etiqueta: 'PDF' };
  if (url.includes('.doc')) return { clase: 'doc', icono: '📘', etiqueta: 'DOC' };
  if (url.includes('.xls')) return { clase: 'xls', icono: '📗', etiqueta: 'XLS' };
  if (url.includes('drive.google.com') || url.includes('docs.google.com')) return { clase: 'doc', icono: '📁', etiqueta: 'DRIVE' };
  return { clase: 'generic', icono: '📄', etiqueta: 'LINK' };
}

// ===== SOCIO: sistema de reservas del Octógono =====
const PRECIO_OCTOGONO_SOCIO = 4500;
const PRECIO_OCTOGONO_CUMPLE = 2000;
const MONTO_LIMPIEZA_OCTOGONO = 700;
const SENA_PORCENTAJE_OCTOGONO = 0.30;

const TURNOS_OCTOGONO = [
  { id: 'manana_tarde', label: 'Turno mañana/tarde', horaInicio: '12:00', horaFin: '18:30' },
  { id: 'noche', label: 'Turno noche', horaInicio: '19:00', horaFin: '02:00' }
];

let octEstado = { tipo: 'salon', fecha: null, turno: null, anio: null, mes: null };

function esCumpleaniosHoy(fechaNacimiento) {
  if (!fechaNacimiento) return false;
  const hoy = new Date();
  const nac = new Date(fechaNacimiento + 'T00:00:00');
  return hoy.getMonth() === nac.getMonth() && hoy.getDate() === nac.getDate();
}

function calcularPrecioOctogonoSocio(usuario) {
  const u = usuariosDB[usuario];
  return esCumpleaniosHoy(u.fechaNacimiento) ? PRECIO_OCTOGONO_CUMPLE : PRECIO_OCTOGONO_SOCIO;
}

function horaAMinutos(h) {
  const [hh, mm] = h.split(':').map(Number);
  return hh * 60 + mm;
}

function rangosSeSuperponen(inicio1, fin1, inicio2, fin2) {
  // maneja turnos que cruzan la medianoche (ej: 19:00 a 02:00)
  const a1 = horaAMinutos(inicio1);
  let b1 = horaAMinutos(fin1);
  if (b1 <= a1) b1 += 24 * 60;
  const a2 = horaAMinutos(inicio2);
  let b2 = horaAMinutos(fin2);
  if (b2 <= a2) b2 += 24 * 60;
  return a1 < b2 && a2 < b1;
}

// ===== ACTIVIDADES: detectar choque de horario con otra clase ya cargada =====
// Devuelve la actividad en conflicto (con la que se superpone) o null si no hay choque.
function buscarConflictoHorarioActividad(dia, hora, horaFin, idExcluir) {
  if (!hora) return null;
  const finComparar = horaFin || hora;
  const diasNuevos = parsearDiasActividad(dia);
  if (diasNuevos.length === 0) return null;

  for (const act of actividadesDB) {
    if (idExcluir !== undefined && idExcluir !== null && act.id === idExcluir) continue;
    if (!act.hora) continue;

    const diasExistentes = parsearDiasActividad(act.dia);
    const hayDiaEnComun = diasNuevos.some(d => diasExistentes.includes(d));
    if (!hayDiaEnComun) continue;

    const finExistente = act.horaFin || act.hora;
    if (rangosSeSuperponen(hora, finComparar, act.hora, finExistente)) {
      return act;
    }
  }
  return null;
}

function mensajeConflictoHorario(actConflicto) {
  const prof = usuariosDB[actConflicto.profesor];
  const nombreProf = prof ? `${prof.nombre} ${prof.apellido1 || ''}`.trim() : actConflicto.profesor;
  const rango = actConflicto.horaFin ? `${actConflicto.hora} a ${actConflicto.horaFin}` : actConflicto.hora;
  return `⚠️ Ese horario ya está ocupado por "${actConflicto.titulo}" (Prof. ${nombreProf}), ${actConflicto.dia} de ${rango} hs.\n\nElegí otro horario o día.`;
}

function turnoOcupado(fechaISO, turnoId) {
  const turno = TURNOS_OCTOGONO.find(t => t.id === turnoId);

  // ¿ya hay una reserva de alquiler en ese mismo día y turno?
  const yaReservado = alquileresDB.some(r => r.fecha === fechaISO && r.turno === turnoId);
  if (yaReservado) return true;

  // ¿hay una actividad/clase ya asignada que se superponga con el horario del turno?
  const dow = new Date(fechaISO + 'T00:00:00').getDay(); // 0=domingo...6=sábado
  const nombresDia = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const diaTexto = nombresDia[dow];

  const hayConflictoActividad = actividadesDB.some(act => {
    if (!act.hora) return false;
    const dias = parsearDiasActividad(act.dia);
    if (!dias.includes(diaTexto)) return false;
    const finActividad = act.horaFin || act.hora;
    return rangosSeSuperponen(turno.horaInicio, turno.horaFin, act.hora, finActividad);
  });

  return hayConflictoActividad;
}

function cambiarMesOctogono(delta) {
  octEstado.mes += delta;

  dibujarCalendarioOctogono();
}

function dibujarCalendarioOctogono() {
  const cont = document.getElementById('octCalendario');
  if (!cont) return;

  const nombresMes = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const anio = octEstado.anio;
  const mes = octEstado.mes;

  const primerDia = new Date(anio, mes, 1);
  const diasEnMes = new Date(anio, mes + 1, 0).getDate();
  const offset = primerDia.getDay(); // 0=domingo

  const hoyISO = new Date().toISOString().split('T')[0];

  let html = `
    <div class="oct-cal-header">
      <button onclick="cambiarMesOctogono(-1)">‹</button>
      <span>${nombresMes[mes]} ${anio}</span>
      <button onclick="cambiarMesOctogono(1)">›</button>
    </div>
    <div class="oct-cal-grid">
      <div class="oct-cal-dow">D</div><div class="oct-cal-dow">L</div><div class="oct-cal-dow">M</div>
      <div class="oct-cal-dow">M</div><div class="oct-cal-dow">J</div><div class="oct-cal-dow">V</div><div class="oct-cal-dow">S</div>
  `;

  for (let i = 0; i < offset; i++) html += `<div class="oct-cal-day vacio"></div>`;

  for (let dia = 1; dia <= diasEnMes; dia++) {
    const fechaObj = new Date(anio, mes, dia);
    const dow = fechaObj.getDay();
    const fechaISO = `${anio}-${String(mes+1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
    const esFinde = (dow === 5 || dow === 6 || dow === 0); // viernes, sábado, domingo
    const esPasado = fechaISO < hoyISO;
    const habilitado = esFinde && !esPasado;
    const seleccionado = fechaISO === octEstado.fecha;

    let clase = 'oct-cal-day';
    if (habilitado) clase += ' habilitado';
    if (seleccionado) clase += ' seleccionado';

    html += `<div class="${clase}" ${habilitado ? `onclick="seleccionarFechaOctogono('${fechaISO}')"` : ''}>${dia}</div>`;
  }

  html += `</div>`;
  cont.innerHTML = html;
}

function seleccionarFechaOctogono(fechaISO) {
  octEstado.fecha = fechaISO;

function dibujarTurnosOctogono() {

function confirmarReservaOctogono() {
  if (!octEstado.fecha || !octEstado.turno) {
    alert('Elegí una fecha y un turno antes de confirmar');
    return;
  }

  const usuario = localStorage.getItem('currentUser');
  const u = usuariosDB[usuario];
  const precio = calcularPrecioOctogonoSocio(usuario);
  const turnoInfo = TURNOS_OCTOGONO.find(t => t.id === octEstado.turno);

  const nuevoId = alquileresDB.length ? Math.max(...alquileresDB.map(x => x.id)) + 1 : 1;
  alquileresDB.push({
    id: nuevoId,
    fecha: octEstado.fecha,
    turno: octEstado.turno,
    turnoLabel: turnoInfo.label,
    solicitante: `${u.nombre} ${u.apellido1 || ''}`.trim(),
    telefono: u.telefono || '',
    montoTotal: precio,
    montoLimpieza: MONTO_LIMPIEZA_OCTOGONO,
    estadoPago: 'Pendiente',
    observaciones: `Reserva realizada por el socio desde la app. Tipo: Salón (incluye parrillero).`,
    registradoPor: usuario,
    origen: 'socio'
  });

  guardarTodo();

  alert(`✅ ¡Reserva solicitada!\n\n${turnoInfo.label} — ${new Date(octEstado.fecha + 'T00:00:00').toLocaleDateString('es-ES')}\n\nRecordá abonar la seña de $${Math.round(precio * SENA_PORCENTAJE_OCTOGONO).toLocaleString('es-UY')} para confirmarla con la Comisión Directiva.`);

  octEstado.fecha = null;
  octEstado.turno = null;
  dibujarCalendarioOctogono();
  document.getElementById('octTurnosContainer').innerHTML = '';
  document.getElementById('octResumenContainer').innerHTML = '';
}

// ===== SOCIO: vista semanal de Actividades =====
let actSemanaOffset = 0; // 0 = semana actual, -1 = anterior, +1 = siguiente...
let actDiaSeleccionado = null; // fecha ISO seleccionada dentro de la semana

function inicioDeSemana(fecha) {
  const d = new Date(fecha);
  const dow = d.getDay(); // 0=domingo
  const diff = dow === 0 ? -6 : 1 - dow; // llevar al lunes
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}

function cambiarSemanaActividades(delta) {
  actSemanaOffset += delta;
  actDiaSeleccionado = null;
  renderActividadesSocio();
}

function renderActividadesSocio() {
  const cont = document.getElementById('actWeekStrip');
  if (!cont) return;

  const hoy = new Date();
  hoy.setDate(hoy.getDate() + actSemanaOffset * 7);
  const lunes = inicioDeSemana(hoy);

  const nombresCortos = ['L','M','M','J','V','S','D'];
  const nombresMes = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

  const dias = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(lunes);
    d.setDate(lunes.getDate() + i);
    dias.push(d);
  }

  const primero = dias[0], ultimo = dias[6];
  const rango = `${primero.getDate()} ${primero.getMonth() !== ultimo.getMonth() ? nombresMes[primero.getMonth()] + ' ' : ''}– ${ultimo.getDate()} ${nombresMes[ultimo.getMonth()]} ${ultimo.getFullYear()}`;
  document.getElementById('actRangoSemana').textContent = rango;

  const hoyISO = new Date().toISOString().split('T')[0];
  if (!actDiaSeleccionado) {
    const hoyEnSemana = dias.find(d => d.toISOString().split('T')[0] === hoyISO);
    actDiaSeleccionado = (hoyEnSemana || dias[0]).toISOString().split('T')[0];
  }

  let html = '';
  dias.forEach((d, i) => {
    const fechaISO = d.toISOString().split('T')[0];
    const seleccionado = fechaISO === actDiaSeleccionado;
    html += `<div class="act-day-btn ${seleccionado ? 'selected' : ''}" onclick="seleccionarDiaActividades('${fechaISO}')">
      <span class="act-day-dow">${nombresCortos[i]}</span>
      <span class="act-day-num">${d.getDate()}</span>
    </div>`;
  });
  cont.innerHTML = html;

  dibujarListaActividadesDia();
}

function seleccionarDiaActividades(fechaISO) {
  actDiaSeleccionado = fechaISO;
  renderActividadesSocio();
}

function dibujarListaActividadesDia() {
  const cont = document.getElementById('actListaDia');
  if (!cont || !actDiaSeleccionado) return;

  const usuarioActual = localStorage.getItem('currentUser');
  const nombresDiaCompleto = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const fechaObj = new Date(actDiaSeleccionado + 'T00:00:00');
  const dow = fechaObj.getDay();
  const diaTexto = nombresDiaCompleto[dow];
  const nombresMes = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const titulo = `${diaTexto} ${fechaObj.getDate()} de ${nombresMes[fechaObj.getMonth()]}`;

  const coloresBorde = ['var(--gold2)', '#5B8DEF', '#3FAE7A', '#B15BE8', '#E85B5B'];

  const clasesDelDia = actividadesDB
    .filter(act => parsearDiasActividad(act.dia).includes(diaTexto))
    .sort((a, b) => (a.hora || '').localeCompare(b.hora || ''));

  let html = `<p class="act-fecha-titulo">${titulo}</p>`;

  if (clasesDelDia.length === 0) {
    html += `<p style="color: var(--gray); font-size:13px;">No hay actividades programadas este día</p>`;
  } else {
    clasesDelDia.forEach((act, idx) => {
      const prof = usuariosDB[act.profesor];
      const nombreProf = prof ? `${prof.nombre} ${prof.apellido1 || ''}`.trim() : act.profesor;
      const rangoHorario = act.horaFin ? `${act.hora} a ${act.horaFin}` : act.hora;
      const inscripto = act.inscriptos.includes(usuarioActual);
      const color = coloresBorde[idx % coloresBorde.length];

      html += `<div class="act-clase-card" style="border-left-color:${color};">
        <div class="act-clase-icon">🧘</div>
        <div class="act-clase-info">
          <div class="act-clase-nombre">${act.titulo}</div>
          <div class="act-clase-prof">Prof. ${nombreProf}</div>
          <div class="act-clase-horario">${rangoHorario} hs</div>
        </div>
        ${inscripto
          ? `<button class="act-clase-btn cancelar" onclick="cancelarInscripcion(${act.id})">Cancelar</button>`
          : `<button class="act-clase-btn anotar" onclick="anotarseActividad(${act.id})">Anotarme</button>`
        }
      </div>`;
    });
  }

  cont.innerHTML = html;
}

// ===== SOCIO: subir y comprimir foto de perfil =====
function subirFotoPerfil(input) {
  const usuario = localStorage.getItem('currentUser');
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const size = 200;
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      const minSide = Math.min(img.width, img.height);
      const sx = (img.width - minSide) / 2;
      const sy = (img.height - minSide) / 2;
      ctx.drawImage(img, sx, sy, minSide, minSide, 0, 0, size, size);

      const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
      usuariosDB[usuario].fotoPerfil = dataUrl;
      guardarTodo();
      actualizarAvataresSocio();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function actualizarAvataresSocio() {
  const usuario = localStorage.getItem('currentUser');
  const u = usuariosDB[usuario];
  if (!u) return;
  const inicial = (u.nombre || '?').charAt(0).toUpperCase();
  const contenido = u.fotoPerfil ? `<img src="${u.fotoPerfil}">` : inicial;
  document.querySelectorAll('.avatar-circle').forEach(el => { el.innerHTML = contenido; });
}

function cargarEventosSocio() {
  const usuarioActual = localStorage.getItem('currentUser');
  const cont = document.getElementById('eventosLista');
  if (!cont) return;

  const porDia = {};
  DIAS_SEMANA.forEach(d => { porDia[d] = []; });

  actividadesDB.forEach(act => {
    const dias = parsearDiasActividad(act.dia);
    dias.forEach(d => {
      if (porDia[d]) porDia[d].push(act);
    });
  });

  DIAS_SEMANA.forEach(d => {
    porDia[d].sort((a, b) => (a.hora || '').localeCompare(b.hora || ''));
  });

  let html = '';
  let hayAlguna = false;

  DIAS_SEMANA.forEach(d => {
    if (porDia[d].length === 0) return;
    hayAlguna = true;
    html += `<h4 style="color: var(--navy); margin: 22px 0 10px 0; padding-bottom: 6px; border-bottom: 2px solid var(--gold);">${d}</h4>`;
    html += `<div style="display:flex; flex-wrap:wrap; gap:15px; margin-bottom:10px;">`;

    porDia[d].forEach(act => {
      const inscripto = act.inscriptos.includes(usuarioActual);
      const cantidad = act.inscriptos.length;
      const prof = usuariosDB[act.profesor];
      const nombreProf = prof ? `${prof.nombre} ${prof.apellido1 || ''}`.trim() : act.profesor;
      const rangoHorario = act.horaFin ? `${act.hora} a ${act.horaFin}` : act.hora;

      html += `<div class="card-compact">
        <h3>${act.titulo}</h3>
        <p>🕐 <strong>${rangoHorario} hs</strong></p>
        <p>👨‍🏫 ${nombreProf}</p>
        <p>👥 ${cantidad} ${cantidad === 1 ? 'inscripto' : 'inscriptos'}</p>
        ${inscripto
          ? `<button class="btn btn-small" style="background:#dc3545; width:auto;" onclick="cancelarInscripcion(${act.id})">Cancelar</button>`
          : `<button class="btn btn-small" style="width:auto;" onclick="anotarseActividad(${act.id})">Anotarme</button>`
        }
      </div>`;
    });

    html += `</div>`;
  });

  if (!hayAlguna) html = '<p style="color: var(--gray);">Todavía no hay actividades cargadas</p>';

  cont.innerHTML = html;
}

function anotarseActividad(id) {
  const usuarioActual = localStorage.getItem('currentUser');
  const act = actividadesDB.find(a => a.id === id);
  if (!act.inscriptos.includes(usuarioActual)) {
    act.inscriptos.push(usuarioActual);
    guardarTodo();
  }
  if (document.getElementById('eventosLista')) cargarEventosSocio();
  if (document.getElementById('calendarioSocioContainer') && document.getElementById('calendarioSocioContainer').style.display !== 'none') cargarCalendarioSocio();
  alert('✅ ¡Te anotaste en ' + act.titulo + '!');
}

function cancelarInscripcion(id) {
  const usuarioActual = localStorage.getItem('currentUser');
  const act = actividadesDB.find(a => a.id === id);
  act.inscriptos = act.inscriptos.filter(u => u !== usuarioActual);
  guardarTodo();
  if (document.getElementById('eventosLista')) cargarEventosSocio();
  if (document.getElementById('calendarioSocioContainer') && document.getElementById('calendarioSocioContainer').style.display !== 'none') cargarCalendarioSocio();
}

// ===== SOCIO: calendario semanal de clases (para anotarse) =====
function toggleCalendarioSocio() {
  const cont = document.getElementById('calendarioSocioContainer');
  if (!cont) return;
  if (cont.style.display === 'none') {
    cont.style.display = 'block';
    cargarCalendarioSocio();
  } else {
    cont.style.display = 'none';
  }
}

function parsearDiasActividad(diaTexto) {
  const texto = (diaTexto || '').toLowerCase();
  return DIAS_SEMANA.filter(d => texto.includes(d.toLowerCase()));
}

function cargarCalendarioSocio() {
  const usuarioActual = localStorage.getItem('currentUser');
  const totalFilas = HORA_FIN_GRILLA - HORA_INICIO_GRILLA + 1;
  const matriz = {};
  DIAS_SEMANA.forEach(d => { matriz[d] = new Array(totalFilas).fill(null); });

  actividadesDB.forEach(act => {
    if (!act.hora) return;
    const dias = parsearDiasActividad(act.dia);
    const [h] = act.hora.split(':').map(Number);
    const fila = h - HORA_INICIO_GRILLA;
    if (fila < 0 || fila >= totalFilas) return;
    dias.forEach(d => {
      if (!matriz[d][fila]) matriz[d][fila] = [];
      matriz[d][fila].push(act);
    });
  });

  let html = '<p style="color: var(--gray); font-size: 13px; margin-bottom: 15px;">Calendario semanal de clases. Tocá "Anotarme" en la que te guste.</p>';
  html += '<div class="grilla-wrap" style="overflow-x:auto;"><table class="grilla-horarios"><thead><tr><th>Hora</th>';
  DIAS_SEMANA.forEach(d => { html += `<th>${d}</th>`; });
  html += '</tr></thead><tbody>';

  for (let fila = 0; fila < totalFilas; fila++) {
    const hora = HORA_INICIO_GRILLA + fila;
    html += `<tr><td class="hora-label">${hora}:00</td>`;
    DIAS_SEMANA.forEach(d => {
      const actividades = matriz[d][fila];
      if (!actividades || actividades.length === 0) {
        html += `<td class="celda-vacia"></td>`;
      } else {
        html += `<td class="celda-clase">`;
        actividades.forEach(act => {
          const inscripto = act.inscriptos.includes(usuarioActual);
          html += `<div style="margin-bottom:8px;">
            <strong>${act.titulo}</strong>
            <span class="celda-horas">${act.hora} · ${act.inscriptos.length} inscriptos</span>
            ${inscripto
              ? `<button class="pill-btn pill-cancelar" onclick="cancelarInscripcion(${act.id})">Cancelar</button>`
              : `<button class="pill-btn pill-anotar" onclick="anotarseActividad(${act.id})">Anotarme</button>`
            }
          </div>`;
        });
        html += `</td>`;
      }
    });
    html += '</tr>';
  }
  html += '</tbody></table></div>';

  document.getElementById('calendarioSocioContainer').innerHTML = html;
}

// ===== DASHBOARD =====
function actualizarDashboard() {

let deferredInstallPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  const btn = document.getElementById('btnInstalarApp');
  if (btn) btn.style.display = 'block';
});

function instalarApp() {
  if (!deferredInstallPrompt) {
    alert('Tu navegador no ofrece instalación automática acá. Buscá en el menú (⋮ o la flecha hacia abajo, arriba de la pantalla) la opción "Agregar a pantalla de inicio" o "Instalar app".');
    return;
  }
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.then(() => {
    deferredInstallPrompt = null;
    const btn = document.getElementById('btnInstalarApp');
    if (btn) btn.style.display = 'none';
  });
}

window.addEventListener('appinstalled', () => {
  const btn = document.getElementById('btnInstalarApp');
  if (btn) btn.style.display = 'none';
  deferredInstallPrompt = null;
  mostrarLoginSinInstalar();
});

function esStandalone() {
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}

// ===== RECUPERAR CONTRASEÑA (EmailJS) =====
const EMAILJS_SERVICE_ID = 'service_plridiv';
const EMAILJS_TEMPLATE_ID = 'template_6tlx6nr';
const EMAILJS_PUBLIC_KEY = '7CodbSG3IlSJMEbD0';

if (typeof emailjs !== 'undefined') {
  emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
}

function generarPasswordTemporal() {
  const letras = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz';
  const numeros = '23456789';
  const simbolos = '!@#$%';
  let pass = '';
  pass += letras.charAt(Math.floor(Math.random() * letras.length)).toUpperCase();
  pass += letras.charAt(Math.floor(Math.random() * letras.length)).toLowerCase();
  pass += numeros.charAt(Math.floor(Math.random() * numeros.length));
  pass += numeros.charAt(Math.floor(Math.random() * numeros.length));
  pass += simbolos.charAt(Math.floor(Math.random() * simbolos.length));
  for (let i = 0; i < 3; i++) pass += letras.charAt(Math.floor(Math.random() * letras.length));
  return pass;
}

function abrirModalRecuperarPassword() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-content">
      <h2>🔑 Recuperar contraseña</h2>
      <p style="font-size:13px; color:#666; margin-bottom:15px;">Ingresá tu usuario o tu correo electrónico registrado. Te vamos a enviar una contraseña temporal por email.</p>
      <input type="text" id="recuperarInput" placeholder="Usuario o correo electrónico">
      <button class="btn" id="btnEnviarRecuperacion" onclick="procesarRecuperarPassword()">Enviar contraseña temporal</button>
      <button class="btn" style="background:#6c757d; margin-top:10px;" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
    </div>
  `;
  document.body.appendChild(overlay);
}

function procesarRecuperarPassword() {
  const input = document.getElementById('recuperarInput').value.trim().toLowerCase();
  if (!input) {
    alert('Ingresá tu usuario o correo electrónico');
    return;
  }

  // Si coincide exactamente con un nombre de usuario, ese es único: vamos directo
  const usuarioExacto = Object.keys(usuariosDB).find(user => user.toLowerCase() === input);
  if (usuarioExacto) {
    enviarPasswordTemporal(usuarioExacto);
    return;
  }

  // Si no, buscamos TODAS las cuentas que tengan ese email (puede ser más de una,
  // por ejemplo la misma persona como socio y como profesor)
  const coincidencias = Object.keys(usuariosDB).filter(user => {
    const u = usuariosDB[user];
    return u.email && u.email.trim().toLowerCase() === input;
  });

  if (coincidencias.length === 0) {
    alert('No encontramos ninguna cuenta con ese usuario o correo. Verificá los datos o contactá al administrador.');
    return;
  }

  if (coincidencias.length === 1) {
    enviarPasswordTemporal(coincidencias[0]);
    return;
  }

  // Varias cuentas con el mismo email: le pedimos que elija cuál quiere recuperar
  mostrarSelectorCuentaRecuperacion(coincidencias);
}

function mostrarSelectorCuentaRecuperacion(usuarios) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  const etiquetasRol = { admin: 'Administrador', tesorero: 'Tesorero', profesor: 'Profesor', socio: 'Socio' };

  let opcionesHtml = '';
  usuarios.forEach(user => {
    const u = usuariosDB[user];
    const nombreCompleto = `${u.nombre} ${u.apellido1 || ''}`.trim();
    opcionesHtml += `
      <div class="deuda-item" style="cursor:pointer;" onclick="elegirCuentaRecuperacion('${user}')">
        <div class="deuda-item-header" style="cursor:pointer;">
          <span class="deuda-item-nombre">${nombreCompleto}</span>
          <span class="deuda-item-badge">${etiquetasRol[u.rol] || u.rol}</span>
        </div>
      </div>
    `;
  });

  overlay.innerHTML = `
    <div class="modal-content">
      <h2>👤 Encontramos varias cuentas</h2>
      <p style="font-size:13px; color:#666; margin-bottom:15px;">Ese correo está registrado en más de una cuenta. Elegí cuál querés recuperar:</p>
      ${opcionesHtml}
      <button class="btn" style="background:#6c757d; margin-top:15px;" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
    </div>
  `;
  document.querySelector('.modal-overlay').remove();
  document.body.appendChild(overlay);
}

function elegirCuentaRecuperacion(usuario) {
  document.querySelector('.modal-overlay').remove();
  enviarPasswordTemporal(usuario);
}

function enviarPasswordTemporal(usuarioEncontrado) {
  const u = usuariosDB[usuarioEncontrado];
  if (!u.email) {
    alert('Esta cuenta no tiene un correo electrónico registrado. Pedile al administrador que te lo cargue o que te restablezca la contraseña manualmente.');
    return;
  }

  const btn = document.getElementById('btnEnviarRecuperacion');
  if (btn) { btn.disabled = true; btn.textContent = 'Enviando...'; }

  const nuevaPassword = generarPasswordTemporal();

  emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
    to_name: u.nombre,
    to_email: u.email,
    to_username: usuarioEncontrado,
    temp_password: nuevaPassword
  }).then(() => {
    u.password = nuevaPassword;
    u.passwordCambiada = false;
    guardarTodo();
    const overlayActivo = document.querySelector('.modal-overlay');
    if (overlayActivo) overlayActivo.remove();
    alert('✅ Te enviamos un correo a ' + u.email + ' con tu contraseña temporal (cuenta: ' + usuarioEncontrado + '). Revisá también la carpeta de spam.');
  }).catch((err) => {
    console.error('Error enviando email de recuperación:', err);
    if (btn) { btn.disabled = false; btn.textContent = 'Enviar contraseña temporal'; }
    alert('❌ No se pudo enviar el correo. Intentá de nuevo en unos minutos, o contactá al administrador.');
  });
}

function mostrarLoginSinInstalar() {
  document.getElementById('pantallaInstalar').style.display = 'none';
  document.getElementById('formularioLoginWrapper').style.display = 'block';
}

function onDatosListos() {
  const indicador = document.getElementById('estadoConexion');
  if (indicador) indicador.textContent = '✅ Conectado';

  // Si la app ya está instalada (se abrió desde el ícono), saltamos directo al login
  if (esStandalone()) {
    mostrarLoginSinInstalar();
  }

  const currentUser = localStorage.getItem('currentUser');
  if (currentUser && usuariosDB[currentUser]) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('appPage').classList.add('active');
    document.getElementById('userDisplay').textContent = usuariosDB[currentUser].nombre;
    document.getElementById('userRole').textContent = usuariosDB[currentUser].rol.toUpperCase();
    renderMenu(currentUser);
  }
}
