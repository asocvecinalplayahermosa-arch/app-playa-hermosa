  }

  }

    font-family: inherit;

  }
  textarea { min-height: 100px; resize: vertical; }

    margin-bottom: 30px;

  .btn-baja-gris { background: #6c757d; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; }
  .btn-baja-rojo { background: #dc3545; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; }
  .btn-baja-verde { background: #28a745; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; }
  .btn-editar { background: var(--navy2); color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; margin-right: 5px; }
  .btn-add-circle {

  select.causal-select { margin-bottom: 0; padding: 6px; font-size: 12px; }
  .grilla-wrap { border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(7,41,74,0.12); border: 1px solid #E7ECF2; }
  .grilla-horarios { border-collapse: collapse; width: 100%; min-width: 620px; table-layout: fixed; font-size: 11px; }
  .grilla-horarios th { background: var(--navy); color: white; padding: 7px 3px; font-size: 10.5px; font-weight: 600; letter-spacing: 0.3px; text-align: center; text-transform: uppercase; }
  .grilla-horarios th:first-child { width: 46px; }
  .grilla-horarios td.hora-label { background: #F6F3EC; color: var(--navy2); font-weight: 700; font-size: 10.5px; text-align: center; width: 46px; padding: 4px 2px; border-bottom: 1px solid #EFEBE1; }
  .grilla-horarios td.celda-vacia { border: 1px solid #F0F2F5; height: 26px; cursor: default; background: #FCFDFE; }
  .grilla-horarios td.celda-vacia.clickeable { cursor: pointer; }
  .grilla-horarios td.celda-vacia.clickeable:hover { background: #F6F3EC; }
  .grilla-horarios td.celda-ocupada,
  .grilla-horarios td.celda-libre,
  .grilla-horarios td.celda-clase { font-size: 10.5px; line-height:1.3; padding: 5px 6px; vertical-align: top; border: 1px solid rgba(0,0,0,0.05); }
  .grilla-horarios td.celda-ocupada { background: #FBEEEF; border-left: 2px solid #C97C86; color: #7A2E37; }
  .grilla-horarios td.celda-libre { background: #EEF6EF; border-left: 2px solid #7FB08F; color: #2F5E3D; }
  .grilla-horarios td.celda-clase { background: #FDF6E8; border-left: 2px solid var(--gold); color: var(--navy); }
  .grilla-horarios td strong { display:block; font-size: 11px; font-weight: 700; margin-bottom: 1px; }
  .grilla-horarios .celda-horas { color: inherit; opacity: 0.7; font-size: 9.5px; display:block; }
  .grilla-horarios .celda-acciones { margin-top: 4px; display:flex; gap:3px; }
  .grilla-horarios .celda-acciones button { border:none; background: rgba(255,255,255,0.75); border-radius:4px; cursor:pointer; font-size:10px; padding:2px 4px; }
  .grilla-horarios td.celda-clase .pill-btn { border:none; border-radius: 20px; font-size: 9.5px; font-weight: 700; padding: 3px 9px; margin-top: 4px; cursor: pointer; letter-spacing:0.2px; }
  .grilla-horarios td.celda-clase .pill-anotar { background: var(--navy2); color: white; }
  .grilla-horarios td.celda-clase .pill-cancelar { background: transparent; color: #A33; border: 1px solid #D99; }
  @media (max-width: 600px) {
    table:not(.grilla-horarios) thead { display: none; }
    table:not(.grilla-horarios) tbody tr {
      display: block;
      background: white;
      border: 1px solid #eee;
      border-radius: 10px;
      margin-bottom: 12px;
      padding: 10px 12px;
      box-shadow: 0 1px 4px rgba(7,41,74,0.08);
    }
    table:not(.grilla-horarios) tbody td {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px solid #f2f2f2;
      text-align: right;
      white-space: normal;
    }
    table:not(.grilla-horarios) tbody td:last-child { border-bottom: none; }
    table:not(.grilla-horarios) tbody td::before {
      content: attr(data-label);
      font-weight: 600;
      color: var(--navy2);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      text-align: left;
      margin-right: 10px;
    }
    table:not(.grilla-horarios) tbody td[data-label="Acciones"] {
      display: block;
      text-align: left;
    }
    table:not(.grilla-horarios) tbody td[data-label="Acciones"]::before {
      display: block;
      margin-bottom: 6px;
    }
    table:not(.grilla-horarios) tbody td[data-label="Acciones"] button {
      display: inline-block;
      margin: 3px 4px 3px 0;
    }
  }
  .app-shell-socio { padding-bottom: 80px; }
  .bottom-nav {

  }

  }

// Guarda todo en Firebase; todos los dispositivos conectados reciben el cambio al instante

// ===== MIGRACIÓN: asegura que los socios ya guardados tengan los campos nuevos =====
function migrarDatosSocios() {
  let huboCambios = false;
  for (let user in usuariosDB) {
    const u = usuariosDB[user];
    if (u.rol === 'socio') {
      if (!Array.isArray(u.historialPagos)) { u.historialPagos = []; huboCambios = true; }
      if (!Array.isArray(u.historialAvisos)) { u.historialAvisos = []; huboCambios = true; }
      if (typeof u.avisosPorDeuda !== 'number') { u.avisosPorDeuda = u.historialAvisos.length; huboCambios = true; }
      if (typeof u.fechaNacimiento === 'undefined') { u.fechaNacimiento = ''; huboCambios = true; }
      if (typeof u.planCuota === 'undefined') { u.planCuota = 'individual'; huboCambios = true; }
      if (!Array.isArray(u.familiaMiembros)) { u.familiaMiembros = []; huboCambios = true; }
      if (typeof u.segundoNombre === 'undefined') { u.segundoNombre = ''; huboCambios = true; }
      if (!Array.isArray(u.fcmTokens)) { u.fcmTokens = []; huboCambios = true; }
    }
  }
  actividadesDB.forEach(act => {
    if (typeof act.horaFin === 'undefined') { act.horaFin = ''; huboCambios = true; }
  });
  return huboCambios;
}

// ===== Escucha en tiempo real: cualquier cambio de cualquier dispositivo llega acá =====
docRefDatos.onSnapshot((snap) => {
  if (snap.exists) {
    const data = snap.data();
    usuariosDB = data.usuariosDB || usuariosDB;
    actividadesDB = data.actividadesDB || actividadesDB;
    eventosDB = data.eventosDB || eventosDB;
    noticiasDB = data.noticiasDB || noticiasDB;

    solicitudesCambioClaseDB = data.solicitudesCambioClaseDB || solicitudesCambioClaseDB;
    egresosDB = data.egresosDB || egresosDB;
    documentosDB = data.documentosDB || documentosDB;
    flyersDB = data.flyersDB || flyersDB;
    if (migrarDatosSocios()) guardarTodo();
  } else {
    // Primera vez: no existe el documento todavía, subimos los datos iniciales
    guardarTodo();

    datosListos = true;
    onDatosListos();

// ===== GENERADOR AUTOMÁTICO DE USUARIO =====
function normalizarTexto(str) {
  return (str || '').toString().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z]/g, '');
}

function generarUsuario(nombre, apellido1, apellido2) {
  const inicial = normalizarTexto(nombre).charAt(0);
  const ap1 = normalizarTexto(apellido1);
  const ap2 = normalizarTexto(apellido2);

  let candidato = inicial + ap1;
  if (!usuariosDB[candidato]) return candidato;

  if (ap2) {
    candidato = inicial + ap1 + ap2.substring(0, 2);
    if (!usuariosDB[candidato]) return candidato;

    candidato = inicial + ap1 + ap2;
    if (!usuariosDB[candidato]) return candidato;
  }

  // último recurso: agregar número
  let i = 2;
  let base = inicial + ap1;
  while (usuariosDB[base + i]) i++;
  return base + i;
}

// ===== PASSWORD VALIDATION =====
function validarPasswordFuerte(password) {
  const minLength = password.length >= 8;
  const hasMayuscula = /[A-Z]/.test(password);
  const hasNumero = /[0-9]/.test(password);
  const hasSymbol = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password);
  return minLength && hasMayuscula && hasNumero && hasSymbol;
}

function obtenerMensajePasswordFuerte() {
  return `La contraseña debe cumplir:\n✓ Mínimo 8 caracteres\n✓ 1 letra mayúscula\n✓ 1 número\n✓ 1 símbolo (!@#$%^&*)\n\nEjemplo: Micontra123!`;
}

// ===== LOGIN =====
function toggleMostrarPassword(inputId, boton) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    boton.textContent = '🙈';
  } else {
    input.type = 'password';
    boton.textContent = '👁️';
  }
}

function handleLogin(event) {
  event.preventDefault();

  if (!datosListos) {
    alert('⏳ Todavía estamos conectando con la base de datos en la nube. Esperá un segundo y volvé a intentar.');
    return;
  }

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  
  if (usuariosDB[username] && usuariosDB[username].password === password) {
    localStorage.setItem('currentUser', username);
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('appPage').classList.add('active');
    document.getElementById('userDisplay').textContent = usuariosDB[username].nombre;
    document.getElementById('userRole').textContent = usuariosDB[username].rol.toUpperCase();
    
    if (!usuariosDB[username].passwordCambiada && usuariosDB[username].rol !== 'admin') {
      setTimeout(() => pedirCambioPassword(username), 500);
    }
    
    renderMenu(username);
  } else {
    alert('Usuario o contraseña incorrectos');
  }
}

function handleLogout() {
  localStorage.removeItem('currentUser');
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('appPage').classList.remove('active');
  document.getElementById('loginForm').reset();

  const navSocio = document.getElementById('bottomNavSocio');
  if (navSocio) navSocio.remove();

  if (esStandalone()) {
    mostrarLoginSinInstalar();
  } else {
    document.getElementById('pantallaInstalar').style.display = 'block';
    document.getElementById('formularioLoginWrapper').style.display = 'none';
  }
}

function pedirCambioPassword(usuario) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-content">
      <h2>🔐 Cambiar contraseña</h2>
      <p style="margin-bottom: 20px; color: #666; font-size: 14px;">Esta es tu primera vez. Debes crear una contraseña fuerte para tu seguridad.</p>
      <div class="warning-box">${obtenerMensajePasswordFuerte()}</div>
      <div style="position:relative;">
        <input type="password" id="newPassword" placeholder="Nueva contraseña" required style="padding-right:42px;">
        <button type="button" onclick="toggleMostrarPassword('newPassword', this)" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:18px; padding:4px; line-height:1;" title="Mostrar/ocultar contraseña">👁️</button>
      </div>
      <div style="position:relative;">
        <input type="password" id="confirmPassword" placeholder="Confirmar contraseña" required style="padding-right:42px;">
        <button type="button" onclick="toggleMostrarPassword('confirmPassword', this)" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:18px; padding:4px; line-height:1;" title="Mostrar/ocultar contraseña">👁️</button>
      </div>
      <button class="btn" onclick="guardarNuevaPassword('${usuario}')">Guardar nueva contraseña</button>
    </div>
  `;
  document.body.appendChild(overlay);
}

function guardarNuevaPassword(usuario) {
  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  
  if (!newPassword || !confirmPassword) {
    alert('Completa ambos campos');
    return;
  }
  
  if (newPassword !== confirmPassword) {
    alert('Las contraseñas no coinciden');
    return;
  }
  
  if (!validarPasswordFuerte(newPassword)) {
    alert(obtenerMensajePasswordFuerte());
    return;
  }
  
  usuariosDB[usuario].password = newPassword;
  usuariosDB[usuario].passwordCambiada = true;
  guardarTodo();
  
  document.querySelector('.modal-overlay').remove();
  alert('✅ Contraseña cambiada exitosamente');
}

// ===== SOCIOS: helpers de causal/baja =====
function tieneCausalPorDeuda(u) {
  return (u.mesesEnDeuda || 0) > 3 && (u.avisosPorDeuda || 0) >= 3;
}

function tieneCausal(u) {
  return tieneCausalPorDeuda(u) || (u.causalSeleccionada && u.causalSeleccionada !== 'Sin causal');
}

function descripcionCausal(u) {
  const motivos = [];
  if (tieneCausalPorDeuda(u)) motivos.push(`Deuda (${u.mesesEnDeuda} meses, ${u.avisosPorDeuda} avisos)`);
  if (u.causalSeleccionada && u.causalSeleccionada !== 'Sin causal') motivos.push(u.causalSeleccionada);
  return motivos.length ? motivos.join(' + ') : 'Sin causal';
}

function calcularEdad(fechaNacimiento) {
  if (!fechaNacimiento) return null;
  const hoy = new Date();
  const nac = new Date(fechaNacimiento + 'T00:00:00');
  let edad = hoy.getFullYear() - nac.getFullYear();
  const m = hoy.getMonth() - nac.getMonth();
  if (m < 0 || (m === 0 && hoy.getDate() < nac.getDate())) edad--;
  return edad;
}

// ===== SOCIOS: tabla =====
function cargarTablaSocios() {
  let html = `<table><thead><tr>
    <th>Nombre completo</th><th>Email</th><th>Usuario</th><th>Tipo de socio</th><th>Teléfono</th>
    <th>Edad</th><th>Estado</th><th>Editar</th><th>Contraseña</th><th>Baja</th>
  </tr></thead><tbody>`;

  const socios = [];
  for (let user in usuariosDB) {
    const u = usuariosDB[user];
    if (u.rol !== 'socio') continue;
    if (u.estado !== 'Activo') continue; // los dados de baja solo se ven en el Historial de bajas
    const nombreCompleto = `${u.nombre} ${u.apellido1 || ''} ${u.apellido2 || ''}`.trim();
    socios.push({ user, u, nombreCompleto });
  }

  socios.sort((a, b) => a.nombreCompleto.localeCompare(b.nombreCompleto, 'es', { sensitivity: 'base' }));

  socios.forEach(({ user, u, nombreCompleto }) => {
    const colorClase = tieneCausalPorDeuda(u) ? 'btn-baja-rojo' : 'btn-baja-gris';
    const botonBaja = `<button class="${colorClase}" onclick="abrirModalBaja('${user}')">Dar de baja</button>`;

    const edad = calcularEdad(u.fechaNacimiento);
    const edadTexto = edad === null ? '-' : `${edad}${edad < 18 ? ' 🧒 <span style="color:#dc3545; font-size:11px; font-weight:bold;">Menor</span>' : ''}`;

    html += `<tr>
      <td data-label="Nombre completo">${nombreCompleto}</td>
      <td data-label="Email">${u.email}</td>
      <td data-label="Usuario"><strong>${user}</strong></td>
      <td data-label="Tipo de socio">${u.tipoSocio || '-'}</td>
      <td data-label="Teléfono" style="white-space:nowrap;">${u.telefono || '-'}</td>
      <td data-label="Edad">${edadTexto}</td>
      <td data-label="Estado">✅ Activo</td>
      <td data-label="Editar"><button class="btn-editar" onclick="abrirModalSocio('${user}')">Editar</button></td>
      <td data-label="Contraseña"><button class="btn-editar" onclick="abrirModalResetPassword('${user}')" title="Restablecer contraseña">🔑</button></td>
      <td data-label="Baja">${botonBaja}</td>
    </tr>`;
  });

  if (socios.length === 0) {
    html += `<tr><td colspan="10" style="color: var(--gray); text-align:center;">No hay socios activos</td></tr>`;
  }

  html += `</tbody></table>`;
  document.getElementById('tablaSocios').innerHTML = html;
}

// Chequea si un email ya está en uso por otra cuenta (para evitar que la recuperación de
// contraseña termine mandándole el cambio a la persona equivocada)
function emailYaUsadoPorOtro(email, usuarioAExcluir) {
  const emailNorm = email.trim().toLowerCase();
  for (let user in usuariosDB) {
    if (user === usuarioAExcluir) continue;
    const u = usuariosDB[user];
    if (u.email && u.email.trim().toLowerCase() === emailNorm) return user;
  }
  return null;
}

function guardarSocio(usuarioExistente) {
  const nombre = document.getElementById('socioNombre').value.trim();
  const segundoNombre = document.getElementById('socioSegundoNombre').value.trim();
  const apellido1 = document.getElementById('socioApellido1').value.trim();
  const apellido2 = document.getElementById('socioApellido2').value.trim();
  const telefono = document.getElementById('socioTelefono').value.trim();
  const fechaNacimiento = document.getElementById('socioFechaNacimiento').value;
  const direccion = document.getElementById('socioDireccion').value.trim();
  const email = document.getElementById('socioEmail').value.trim();
  const tipoSocio = document.getElementById('socioTipo').value;
  const planCuota = document.getElementById('socioPlanCuota').value;
  const familiaMiembros = Array.from(document.getElementById('socioFamiliaMiembros').selectedOptions).map(opt => opt.value);
  const mesesEnDeudaManual = parseInt(document.getElementById('socioMesesEnDeuda').value) || 0;

  if (!nombre || !apellido1 || !email) {
    alert('Nombre, primer apellido y email son obligatorios');
    return;
  }

  const otroConMismoEmail = emailYaUsadoPorOtro(email, usuarioExistente);
  if (otroConMismoEmail) {
    const u2 = usuariosDB[otroConMismoEmail];
    const continuar = confirm(`ℹ️ Ese email ya está registrado en otra cuenta: ${u2.nombre || otroConMismoEmail} (rol: ${u2.rol}, usuario: ${otroConMismoEmail}).\n\nEsto es normal si es la misma persona con dos roles distintos (por ejemplo, socio y profesor). Al recuperar la contraseña, la app va a preguntar cuál de las cuentas querés restablecer.\n\n¿Continuar y guardar igual?`);
    if (!continuar) return;
  }

  if (usuarioExistente) {
    // EDITAR
    const u = usuariosDB[usuarioExistente];
    u.nombre = nombre;
    u.segundoNombre = segundoNombre;
    u.apellido1 = apellido1;
    u.apellido2 = apellido2;
    u.telefono = telefono;
    u.fechaNacimiento = fechaNacimiento;
    u.direccion = direccion;
    u.email = email;
    u.tipoSocio = tipoSocio;
    u.planCuota = planCuota;
    u.familiaMiembros = familiaMiembros;
    if (!u.historialPagos || u.historialPagos.length === 0) {
      u.mesesEnDeuda = mesesEnDeudaManual;
    }
    guardarTodo();
    document.querySelector('.modal-overlay').remove();
    cargarTablaSocios();
    actualizarDashboard();
    alert('✅ Socio actualizado');
  } else {
    // NUEVO
    const usuario = generarUsuario(nombre, apellido1, apellido2);
    usuariosDB[usuario] = {
      password: '1234',
      nombre, segundoNombre, apellido1, apellido2, telefono, fechaNacimiento, direccion, email,
      rol: 'socio',
      passwordCambiada: false,
      tipoSocio,
      planCuota,
      familiaMiembros,
      estado: 'Activo',
      mesesEnDeuda: 0,
      avisosPorDeuda: 0,
      causalSeleccionada: 'Sin causal',
      historialBaja: [],
      historialPagos: [],
      historialAvisos: []
    };
    guardarTodo();
    document.querySelector('.modal-overlay').remove();
    cargarTablaSocios();
    actualizarDashboard();
    alert(`✅ Socio creado con usuario: ${usuario}\nContraseña inicial: 1234`);
  }
}

      hayBajas = true;
      u.historialBaja.forEach((h, idx) => {

// ===== SOCIOS: cumpleaños del mes =====
function mostrarCumpleanosDelMes() {
  const hoy = new Date();
  const mesActual = hoy.getMonth();
  const nombresMes = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  let cumples = [];
  for (let user in usuariosDB) {
    const u = usuariosDB[user];
    if (u.rol === 'socio' && u.estado === 'Activo' && u.fechaNacimiento) {
      const nac = new Date(u.fechaNacimiento + 'T00:00:00');
      if (nac.getMonth() === mesActual) {
        cumples.push({ nombre: `${u.nombre} ${u.apellido1 || ''}`.trim(), dia: nac.getDate(), edadCumple: calcularEdad(u.fechaNacimiento) });
      }
    }
  }
  cumples.sort((a, b) => a.dia - b.dia);

  let html = `<h3 style="color: var(--navy); margin: 20px 0;">🎂 Cumpleaños de ${nombresMes[mesActual]}</h3>`;
  if (cumples.length === 0) {
    html += '<p style="color: var(--gray);">No hay cumpleaños de socios este mes (o falta cargar la fecha de nacimiento)</p>';
  } else {
    html += `<table><thead><tr><th>Día</th><th>Nombre</th></tr></thead><tbody>`;
    cumples.forEach(c => {
      html += `<tr><td><strong>${c.dia}</strong></td><td>${c.nombre}</td></tr>`;
    });
    html += `</tbody></table>`;
  }

  document.getElementById('tablaSocios').innerHTML = html;
}

// Trae título, descripción e imagen del link pegado (usa un servicio público de vista previa de links)
async function autocompletarNoticiaDesdeLink() {
  const link = document.getElementById('noticiaLink').value.trim();
  const estadoDiv = document.getElementById('noticiaAutoEstado');

  if (!link) {
    alert('Pegá primero un link en el campo de arriba');
    return;
  }

  estadoDiv.textContent = '⏳ Buscando datos del link...';

  try {
    const resp = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(link)}`);
    const json = await resp.json();

    if (json.status !== 'success') {
      estadoDiv.textContent = '';
      alert('No se pudieron obtener datos automáticamente de ese link. Completá el título y la descripción a mano.');
      return;
    }

    const datos = json.data;
    if (datos.title) document.getElementById('noticiaTitulo').value = datos.title;
    if (datos.description) document.getElementById('noticiaDescripcion').value = datos.description;

    if (datos.image && datos.image.url) {
      document.getElementById('noticiaImagen').value = datos.image.url;
      document.getElementById('noticiaImagenPreview').innerHTML = `<img src="${datos.image.url}" style="width:100%; max-height:160px; object-fit:cover; border-radius:8px; margin-bottom:10px;">`;
    }

    estadoDiv.textContent = '✅ Datos encontrados. Podés editarlos antes de guardar.';
  } catch (err) {
    console.error('Error obteniendo datos del link:', err);
    estadoDiv.textContent = '';
    alert('No se pudo conectar con el servicio de autocompletado. Completá el título y la descripción a mano.');
  }
}

      <input type="file" id="flyerArchivo" accept="image/*">

      <button class="btn" id="flyerBtnGuardar" onclick="guardarFlyer(${editando ? idExistente : 'null'})">Guardar Flyer</button>

    </div>
  `;
  document.body.appendChild(overlay);

function guardarFlyer(idExistente) {
  const titulo = document.getElementById('flyerTitulo').value.trim();
  const descripcion = document.getElementById('flyerDescripcion').value.trim();
  const archivo = document.getElementById('flyerArchivo').files[0];
  const estadoDiv = document.getElementById('flyerSubidaEstado');
  const btnGuardar = document.getElementById('flyerBtnGuardar');

  if (!titulo) {
    alert('El título es obligatorio');
    return;
  }

  const editando = idExistente !== null && idExistente !== undefined;
  if (!editando && !archivo) {
    alert('Subí una imagen para el flyer');
    return;
  }

  function finalizarGuardadoFlyer(imagen) {
    if (editando) {
      const fl = flyersDB.find(f => f.id === idExistente);
      fl.titulo = titulo; fl.descripcion = descripcion;
      if (imagen) fl.imagen = imagen;
      alert('✅ Flyer actualizado');
    } else {
      const nuevoId = flyersDB.length ? Math.max(...flyersDB.map(f => f.id)) + 1 : 1;
      flyersDB.push({ id: nuevoId, titulo, descripcion, imagen, tipo: 'flyer' });
      alert('✅ Flyer agregado');
    }

    guardarTodo();
    document.querySelector('.modal-overlay').remove();
    cargarTablaFlyers();
  }

  if (archivo) {
    btnGuardar.disabled = true;
    estadoDiv.textContent = '⏳ Subiendo imagen...';

    const nombreLimpio = archivo.name.replace(/[^a-zA-Z0-9._-]/g, '_');
    const rutaArchivo = `flyers/${Date.now()}_${nombreLimpio}`;
    const refArchivo = storage.ref().child(rutaArchivo);
    const uploadTask = refArchivo.put(archivo);

    uploadTask.on('state_changed',
      (snapshot) => {
        const porcentaje = Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100);
        estadoDiv.textContent = `⏳ Subiendo imagen... ${porcentaje}%`;
      },
      (error) => {
        console.error('Error subiendo flyer:', error);
        btnGuardar.disabled = false;
        estadoDiv.textContent = '';
        alert('❌ No se pudo subir la imagen. Puede que falten permisos en Firebase Storage (revisá las reglas de Storage en Firebase Console) o el archivo sea muy pesado.');
      },
      () => {
        uploadTask.snapshot.ref.getDownloadURL().then((url) => {
          estadoDiv.textContent = '';
          finalizarGuardadoFlyer(url);
        });
      }
    );
  } else {
    finalizarGuardadoFlyer(null);
  }
}

function eliminarFlyer(id) {
  if (!confirm('¿Seguro que querés eliminar este flyer?')) return;
  const fl = flyersDB.find(f => f.id === id);

  if (fl && fl.imagen && fl.imagen.includes('firebasestorage')) {
    storage.refFromURL(fl.imagen).delete().catch(err => console.error('No se pudo borrar la imagen de Storage (puede que ya no exista):', err));
  }

  flyersDB = flyersDB.filter(f => f.id !== id);
  guardarTodo();
  cargarTablaFlyers();
}

      <button class="btn" id="docBtnGuardar" onclick="guardarDocumento(${editando ? idExistente : 'null'})">Guardar documento</button>

function guardarDocumento(idExistente) {
  const categoria = document.getElementById('docCategoria').value;
  const titulo = document.getElementById('docTitulo').value.trim();
  const descripcion = document.getElementById('docDescripcion').value.trim();
  const archivo = document.getElementById('docArchivo').files[0];
  const hoy = new Date().toISOString().split('T')[0];
  const estadoDiv = document.getElementById('docSubidaEstado');
  const btnGuardar = document.getElementById('docBtnGuardar');

  if (!titulo) {
    alert('El título es obligatorio');
    return;
  }

  function finalizarGuardadoDocumento(link) {
    if (idExistente !== null && idExistente !== undefined) {
      const doc = documentosDB.find(d => d.id === idExistente);
      doc.categoria = categoria; doc.titulo = titulo; doc.descripcion = descripcion;
      if (link) doc.link = link;
      alert('✅ Documento actualizado');
    } else {
      const nuevoId = documentosDB.length ? Math.max(...documentosDB.map(d => d.id)) + 1 : 1;
      documentosDB.push({ id: nuevoId, categoria, titulo, descripcion, link: link || '', fecha: hoy });
      alert('✅ Documento agregado');
    }

    guardarTodo();
    document.querySelector('.modal-overlay').remove();
    cargarTablaDocumentosAdmin();
  }

  if (archivo) {
    btnGuardar.disabled = true;
    estadoDiv.textContent = '⏳ Subiendo archivo...';

    const nombreLimpio = archivo.name.replace(/[^a-zA-Z0-9._-]/g, '_');
    const rutaArchivo = `documentos/${Date.now()}_${nombreLimpio}`;
    const refArchivo = storage.ref().child(rutaArchivo);
    const uploadTask = refArchivo.put(archivo);

    uploadTask.on('state_changed',
      (snapshot) => {
        const porcentaje = Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100);
        estadoDiv.textContent = `⏳ Subiendo archivo... ${porcentaje}%`;
      },
      (error) => {
        console.error('Error subiendo archivo:', error);
        btnGuardar.disabled = false;
        estadoDiv.textContent = '';
        alert('❌ No se pudo subir el archivo. Puede que falten permisos en Firebase Storage (revisá las reglas de Storage en Firebase Console) o el archivo sea muy pesado.');
      },
      () => {
        uploadTask.snapshot.ref.getDownloadURL().then((url) => {
          estadoDiv.textContent = '';
          finalizarGuardadoDocumento(url);
        });
      }
    );
  } else {
    finalizarGuardadoDocumento(null);
  }
}

function eliminarDocumento(id) {
  if (!confirm('¿Seguro que querés eliminar este documento?')) return;
  const doc = documentosDB.find(d => d.id === id);

  if (doc && doc.link && doc.link.includes('firebasestorage')) {
    storage.refFromURL(doc.link).delete().catch(err => console.error('No se pudo borrar el archivo de Storage (puede que ya no exista):', err));
  }

  documentosDB = documentosDB.filter(d => d.id !== id);
  guardarTodo();
  cargarTablaDocumentosAdmin();
  if (document.getElementById('documentosListaSocio')) cargarDocumentosSocio();
}

function combinarActividadesRepetidas() {
  const confirmado = confirm('Esto va a combinar en una sola fila las actividades con el mismo título, profesor y horario que se repiten en distintos días (ej: "Gimnasia" en Lunes y en Jueves pasa a ser una sola fila "Lunes y Jueves").\n\n¿Continuar?');
  if (!confirmado) return;

  const grupos = {};
  actividadesDB.forEach(act => {
    const clave = `${act.titulo}|${act.hora}|${act.horaFin || ''}|${act.profesor}`;
    if (!grupos[clave]) grupos[clave] = [];
    grupos[clave].push(act);
  });

  const nuevaLista = [];
  let siguienteId = 1;
  let combinadas = 0;

  Object.values(grupos).forEach(grupo => {
    if (grupo.length === 1) {
      nuevaLista.push({ ...grupo[0], id: siguienteId++ });
    } else {
      combinadas++;
      const diasUnicos = [];
      grupo.forEach(act => {
        parsearDiasActividad(act.dia).forEach(d => { if (!diasUnicos.includes(d)) diasUnicos.push(d); });
      });
      diasUnicos.sort((a, b) => DIAS_SEMANA.indexOf(a) - DIAS_SEMANA.indexOf(b));
      const diaCombinado = diasUnicos.join(' y ');
      const inscriptosUnicos = [...new Set(grupo.flatMap(a => a.inscriptos))];

      nuevaLista.push({
        id: siguienteId++,
        titulo: grupo[0].titulo,
        profesor: grupo[0].profesor,
        descripcion: grupo[0].descripcion,
        dia: diaCombinado,
        hora: grupo[0].hora,
        horaFin: grupo[0].horaFin,
        inscriptos: inscriptosUnicos
      });
    }
  });

  actividadesDB = nuevaLista;
  guardarTodo();
  cargarTablaActividades();

}

// ===== TESORERO: Reportes Financieros =====
const NOMBRES_MESES_ES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

function quitarAcentos(str) {
  return (str || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

// Busca en el texto del concepto (ej: "Cuota social - Julio a Diciembre 2026")
// hasta qué mes quedó cubierto el pago. Si hay dos meses mencionados, se toma
// el último (el mes final del rango). Si no se encuentra ningún mes, devuelve null.
function extraerCoberturaConcepto(concepto) {
  if (!concepto) return null;
  const texto = quitarAcentos(concepto.toLowerCase());
  const anioMatch = texto.match(/\b(20\d{2})\b/);
  if (!anioMatch) return null;
  const anio = parseInt(anioMatch[1]);

  const encontrados = [];
  NOMBRES_MESES_ES.forEach((nombre, idx) => {
    let pos = texto.indexOf(nombre);
    while (pos !== -1) {
      encontrados.push({ idx, pos });
      pos = texto.indexOf(nombre, pos + nombre.length);
    }
  });
  if (encontrados.length === 0) return null;

  encontrados.sort((a, b) => a.pos - b.pos);
  const mesFinal = encontrados[encontrados.length - 1].idx; // el último mes mencionado = hasta dónde cubre
  return { mes: mesFinal, anio };
}

// Recalcula automáticamente "mesesEnDeuda" para los socios que ya tienen pagos
// registrados, comparando hasta qué mes están cubiertos contra el mes actual.
// A los socios sin ningún pago registrado no los toca (se pueden ajustar a mano
// desde "Editar socio", por ejemplo para casos excepcionales).
function actualizarMesesEnDeudaAutomatico() {
  const hoy = new Date();
  const mesActualTotal = hoy.getFullYear() * 12 + hoy.getMonth();
  let huboCambios = false;

  for (let user in usuariosDB) {
    const u = usuariosDB[user];
    if (u.rol !== 'socio' || u.estado !== 'Activo') continue;
    if (!u.historialPagos || u.historialPagos.length === 0) continue;

    const alDiaHasta = calcularAlDiaHasta(u);
    if (!alDiaHasta) continue;

    const mesCubiertoTotal = alDiaHasta.getFullYear() * 12 + alDiaHasta.getMonth();
    const mesesAtraso = Math.max(0, mesActualTotal - mesCubiertoTotal);

    if (u.mesesEnDeuda !== mesesAtraso) {
      u.mesesEnDeuda = mesesAtraso;
      huboCambios = true;
    }
  }

  if (huboCambios) guardarTodo();
}

function calcularAlDiaHasta(u) {
  if (!u.historialPagos || u.historialPagos.length === 0) return null;

  let mejorCobertura = null;

  u.historialPagos.forEach(p => {
    let candidato;
    if (typeof p.periodoHastaMes === 'number' && p.periodoHastaAnio) {
      // dato estructurado cargado desde el formulario (el más confiable)
      candidato = { mes: p.periodoHastaMes, anio: p.periodoHastaAnio };
    } else {
      candidato = extraerCoberturaConcepto(p.concepto);
      if (!candidato) {
        // no se pudo interpretar el concepto: como respaldo, asumimos que cubre
        // el mes de la fecha en que se registró el pago
        const f = new Date(p.fecha + 'T00:00:00');
        candidato = { mes: f.getMonth(), anio: f.getFullYear() };
      }
    }
    if (!mejorCobertura || candidato.anio > mejorCobertura.anio ||
        (candidato.anio === mejorCobertura.anio && candidato.mes > mejorCobertura.mes)) {
      mejorCobertura = candidato;
    }
  });

  if (!mejorCobertura) return null;
  return new Date(mejorCobertura.anio, mejorCobertura.mes, 1);
}

let reporteFinancieroYaGenerado = false;
let ultimoReporteData = null;

function generarReporteFinanciero() {
  const cont = document.getElementById('reporteFinancieroResultado');
  if (!cont) return;

  reporteFinancieroYaGenerado = true;

  const desde = document.getElementById('repFechaDesde').value;
  const hasta = document.getElementById('repFechaHasta').value;
  const verIngresos = document.getElementById('repChkIngresos').checked;
  const verDeuda = document.getElementById('repChkDeuda').checked;
  const verAlDia = document.getElementById('repChkAlDia').checked;
  const verEgresos = document.getElementById('repChkEgresos').checked;

  if (!verIngresos && !verDeuda && !verAlDia && !verEgresos) {
    cont.innerHTML = '<p style="color: var(--gray); font-size:13px;">Elegí al menos una opción para ver el reporte.</p>';
    ultimoReporteData = null;
    return;
  }

  // ===== Ingresos por cuotas sociales =====
  let ingresosCuotas = 0;
  for (let user in usuariosDB) {
    const u = usuariosDB[user];
    if (u.rol !== 'socio' || !u.historialPagos) continue;
    u.historialPagos.forEach(p => {
      if (p.fecha >= desde && p.fecha <= hasta) ingresosCuotas += p.monto;
    });
  }

  // ===== Ingresos por alquileres pagados =====
  let ingresosAlquileres = 0;
  alquileresDB.forEach(r => {
    if (r.estadoPago === 'Pagado' && r.fecha >= desde && r.fecha <= hasta) ingresosAlquileres += (r.montoTotal || 0);
  });

  // ===== Ingresos por comisión de profesores (registrado, no necesariamente cobrado) =====
  let ingresosComisiones = 0;
  registrosClaseDB.forEach(r => {
    if (r.fecha >= desde && r.fecha <= hasta) ingresosComisiones += (r.comision || 0);
  });

  const totalIngresos = ingresosCuotas + ingresosAlquileres + ingresosComisiones;

  // ===== Egresos del período =====
  const egresosDelPeriodo = egresosDB.filter(e => e.fecha >= desde && e.fecha <= hasta);
  const totalEgresos = egresosDelPeriodo.reduce((sum, e) => sum + (e.monto || 0), 0);
  const egresosPorCategoria = {};
  egresosDelPeriodo.forEach(e => {
    egresosPorCategoria[e.categoria] = (egresosPorCategoria[e.categoria] || 0) + e.monto;
  });

  // ===== Socios con deuda / al día (estado actual, no depende del período elegido) =====
  const socios = Object.entries(usuariosDB).filter(([user, u]) => u.rol === 'socio' && u.estado === 'Activo');
  const conDeuda = socios.filter(([user, u]) => (u.mesesEnDeuda || 0) > 0)
    .sort((a, b) => (b[1].mesesEnDeuda || 0) - (a[1].mesesEnDeuda || 0));
  const alDia = socios.filter(([user, u]) => !(u.mesesEnDeuda > 0));

  // Guardamos todo para que el botón de Excel use exactamente los mismos datos
  ultimoReporteData = { desde, hasta, verIngresos, verDeuda, verAlDia, verEgresos, ingresosCuotas, ingresosAlquileres, ingresosComisiones, totalIngresos, conDeuda, alDia, egresosDelPeriodo, totalEgresos, egresosPorCategoria };

  let htmlFinal = '';

  if (verIngresos) {
    htmlFinal += `
      <h3 style="color: var(--navy); margin: 20px 0 15px 0;">💰 Ingresos del período</h3>
      <div style="display:flex; gap:15px; margin-bottom:20px; flex-wrap:wrap;">
        <div class="card" style="flex:1; min-width:150px; text-align:center; margin-bottom:0;"><h3 style="color:var(--navy);">$${ingresosCuotas.toLocaleString('es-UY')}</h3><p style="font-size:12px;">Cuotas sociales</p></div>
        <div class="card" style="flex:1; min-width:150px; text-align:center; margin-bottom:0;"><h3 style="color:var(--navy);">$${ingresosAlquileres.toLocaleString('es-UY')}</h3><p style="font-size:12px;">Alquileres pagados</p></div>
        <div class="card" style="flex:1; min-width:150px; text-align:center; margin-bottom:0;"><h3 style="color:var(--navy);">$${ingresosComisiones.toLocaleString('es-UY')}</h3><p style="font-size:12px;">Comisión profesores</p></div>
        <div class="card" style="flex:1; min-width:150px; text-align:center; margin-bottom:0; border-left-color: var(--navy2);"><h3 style="color:var(--navy2);">$${totalIngresos.toLocaleString('es-UY')}</h3><p style="font-size:12px; font-weight:700;">Total ingresos</p></div>
      </div>
    `;
  }

  if (verEgresos) {
    let htmlCategorias = Object.entries(egresosPorCategoria)
      .map(([cat, monto]) => `<div class="card" style="flex:1; min-width:150px; text-align:center; margin-bottom:0; border-left-color:#A33;"><h3 style="color:#A33; font-size:16px;">$${monto.toLocaleString('es-UY')}</h3><p style="font-size:11px;">${cat}</p></div>`)
      .join('');
    if (!htmlCategorias) htmlCategorias = `<p style="color: var(--gray); font-size:13px;">No hay egresos registrados en este período</p>`;

    htmlFinal += `
      <h3 style="color: var(--navy); margin: 25px 0 15px 0;">💸 Egresos del período</h3>
      <div style="display:flex; gap:15px; margin-bottom:10px; flex-wrap:wrap;">${htmlCategorias}</div>
      <p style="font-size:13px; margin-bottom:20px;">Total egresos: <strong style="color:#A33;">$${totalEgresos.toLocaleString('es-UY')}</strong></p>
    `;
  }

  if (verIngresos && verEgresos) {
    const balance = totalIngresos - totalEgresos;
    htmlFinal += `
      <div class="card" style="text-align:center; border-left-color: ${balance >= 0 ? '#28a745' : '#A33'}; margin-bottom:20px;">
        <h3 style="color: ${balance >= 0 ? '#28a745' : '#A33'};">$${balance.toLocaleString('es-UY')}</h3>
        <p style="font-size:13px; font-weight:700;">Balance neto del período (Ingresos − Egresos)</p>
      </div>
    `;
  }

  if (verDeuda) {
    let htmlDeuda = '';
    if (conDeuda.length === 0) {
      htmlDeuda = `<p style="color: var(--gray); font-size:13px;">No hay socios con cuotas pendientes 🎉</p>`;
    } else {
      htmlDeuda = `<table><thead><tr><th>Socio</th><th>Meses adeudados</th></tr></thead><tbody>`;
      conDeuda.forEach(([user, u]) => {
        htmlDeuda += `<tr><td data-label="Socio">${u.nombre} ${u.apellido1 || ''}</td><td data-label="Meses adeudados"><strong style="color:#A33;">${u.mesesEnDeuda}</strong></td></tr>`;
      });
      htmlDeuda += `</tbody></table>`;
    }
    htmlFinal += `<h3 style="color: var(--navy); margin: 25px 0 12px 0;">🔴 Socios con cuota pendiente</h3>${htmlDeuda}`;
  }

  if (verAlDia) {
    let htmlAlDia = `<table><thead><tr><th>Socio</th><th>Al día hasta</th></tr></thead><tbody>`;
    alDia.forEach(([user, u]) => {
      const hastaFecha = calcularAlDiaHasta(u);
      const texto = hastaFecha
        ? hastaFecha.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' })
        : 'Sin pagos registrados';
      htmlAlDia += `<tr><td data-label="Socio">${u.nombre} ${u.apellido1 || ''}</td><td data-label="Al día hasta" style="text-transform:capitalize;">${texto}</td></tr>`;
    });
    htmlAlDia += `</tbody></table>`;
    htmlFinal += `
      <h3 style="color: var(--navy); margin: 25px 0 12px 0;">✅ Socios al día</h3>
      <p style="color: var(--gray); font-size:12px; margin-bottom:10px;">Calculado a partir del período real cubierto en cada pago.</p>
      ${htmlAlDia}
    `;
  }

  cont.innerHTML = htmlFinal;
}

// ===== TESORERO: exportar el reporte financiero a Excel =====
function exportarReporteExcel() {
  if (!ultimoReporteData) {
    alert('Primero tocá "Generar reporte" para poder exportarlo.');
    return;
  }

  const d = ultimoReporteData;
  const wb = XLSX.utils.book_new();

  if (d.verIngresos) {
    const filasIngresos = [
      ['Concepto', 'Monto'],
      ['Cuotas sociales', d.ingresosCuotas],
      ['Alquileres pagados', d.ingresosAlquileres],
      ['Comisión profesores', d.ingresosComisiones],
      ['TOTAL INGRESOS', d.totalIngresos],
      [],
      [`Período: ${d.desde} a ${d.hasta}`]
    ];
    if (d.verEgresos) {
      filasIngresos.push([], ['TOTAL EGRESOS', d.totalEgresos], ['BALANCE NETO', d.totalIngresos - d.totalEgresos]);
    }
    const wsIngresos = XLSX.utils.aoa_to_sheet(filasIngresos);
    XLSX.utils.book_append_sheet(wb, wsIngresos, 'Ingresos');
  }

  if (d.verEgresos) {
    const filasEgresos = [['Fecha', 'Categoría', 'Concepto', 'Monto']];
    d.egresosDelPeriodo.forEach(e => {
      filasEgresos.push([e.fecha, e.categoria, e.concepto, e.monto]);
    });
    filasEgresos.push([], ['TOTAL EGRESOS', '', '', d.totalEgresos]);
    const wsEgresos = XLSX.utils.aoa_to_sheet(filasEgresos);
    XLSX.utils.book_append_sheet(wb, wsEgresos, 'Egresos');
  }

  if (d.verDeuda) {
    const filasDeuda = [['Socio', 'Meses adeudados']];
    d.conDeuda.forEach(([user, u]) => {
      filasDeuda.push([`${u.nombre} ${u.apellido1 || ''}`.trim(), u.mesesEnDeuda]);
    });
    const wsDeuda = XLSX.utils.aoa_to_sheet(filasDeuda);
    XLSX.utils.book_append_sheet(wb, wsDeuda, 'Socios con deuda');
  }

  if (d.verAlDia) {
    const filasAlDia = [['Socio', 'Al día hasta']];
    d.alDia.forEach(([user, u]) => {
      const hastaFecha = calcularAlDiaHasta(u);
      const texto = hastaFecha
        ? hastaFecha.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' })
        : 'Sin pagos registrados';
      filasAlDia.push([`${u.nombre} ${u.apellido1 || ''}`.trim(), texto]);
    });
    const wsAlDia = XLSX.utils.aoa_to_sheet(filasAlDia);
    XLSX.utils.book_append_sheet(wb, wsAlDia, 'Socios al dia');
  }

  const nombreArchivo = `Reporte_Financiero_PlayaHermosa_${d.desde}_a_${d.hasta}.xlsx`;
  XLSX.writeFile(wb, nombreArchivo);
}

// ===== TESORERO: registros de clase (comisión de profesores) =====
function cargarTablaRegistrosClaseTesorero() {
  const cont = document.getElementById('tablaRegistrosClaseTesorero');
  const resumenCont = document.getElementById('resumenRegistrosClase');
  if (!cont) return;

  const lista = registrosClaseDB.slice().sort((a, b) => (b.fecha || '').localeCompare(a.fecha || ''));

  const totalComisiones = registrosClaseDB.reduce((sum, r) => sum + (r.comision || 0), 0);
  const totalCobrado = registrosClaseDB.reduce((sum, r) => sum + (r.totalCobrado || 0), 0);

  if (resumenCont) {
    resumenCont.innerHTML = `
      <div style="display:flex; gap:15px; margin-bottom:15px; flex-wrap:wrap;">
        <div class="card" style="flex:1; min-width:150px; text-align:center; margin-bottom:0;"><h3 style="color:var(--navy);">$${totalCobrado.toLocaleString('es-UY')}</h3><p style="font-size:12px;">Total cobrado por profesores</p></div>
        <div class="card" style="flex:1; min-width:150px; text-align:center; margin-bottom:0;"><h3 style="color:var(--navy);">$${totalComisiones.toLocaleString('es-UY')}</h3><p style="font-size:12px;">Comisión (10%) a favor de la Asociación</p></div>
        <div class="card" style="flex:1; min-width:150px; text-align:center; margin-bottom:0;"><h3 style="color:var(--navy);">${registrosClaseDB.length}</h3><p style="font-size:12px;">Clases registradas</p></div>
      </div>
    `;
  }

  let html = `<table><thead><tr><th>Fecha</th><th>Profesor</th><th>Actividad</th><th>Alumnos</th><th>Total cobrado</th><th>Comisión (10%)</th></tr></thead><tbody>`;

  if (lista.length === 0) {
    html += `<tr><td colspan="6" style="color: var(--gray); text-align:center;">Todavía no hay registros de clase cargados</td></tr>`;
  }

  lista.forEach(r => {
    const prof = usuariosDB[r.profesor];
    const nombreProf = prof ? `${prof.nombre} ${prof.apellido1 || ''}`.trim() : r.profesor;
    const fechaFormateada = new Date(r.fecha + 'T00:00:00').toLocaleDateString('es-ES');
    const detalleAlumnos = r.alumnos.map(a => `${a.nombre}${a.esSocio ? '' : ' (no socio)'}`).join(', ');

    html += `<tr>
      <td data-label="Fecha"><strong>${fechaFormateada}</strong></td>
      <td data-label="Profesor">${nombreProf}</td>
      <td data-label="Actividad">${r.actividadTitulo}</td>
      <td data-label="Alumnos" title="${detalleAlumnos}">${r.alumnos.length}</td>
      <td data-label="Total cobrado">$${r.totalCobrado.toLocaleString('es-UY')}</td>
      <td data-label="Comisión (10%)"><strong>$${r.comision.toLocaleString('es-UY')}</strong></td>
    </tr>`;
  });

  html += `</tbody></table>`;
  cont.innerHTML = html;
}

        <option value="USD" ${editando && egreso.moneda === 'USD' ? 'selected' : ''}>USD (Dólares)</option>
      </select>
      <label style="font-size:12px; font-weight:600;">Monto</label>
      <input type="number" id="egrMonto" min="0" step="0.01" value="${editando ? egreso.monto : ''}">
      <button class="btn" onclick="guardarEgreso(${editando ? idExistente : 'null'})">Guardar egreso</button>

function guardarEgreso(idExistente) {
  const fecha = document.getElementById('egrFecha').value;
  const categoria = document.getElementById('egrCategoria').value;
  const concepto = document.getElementById('egrConcepto').value.trim();
  const comprobante = document.getElementById('egrComprobante').value.trim();
  const moneda = document.getElementById('egrMoneda').value;
  const monto = parseFloat(document.getElementById('egrMonto').value);
  const tesorero = localStorage.getItem('currentUser');

  if (!fecha || !concepto || !monto || monto <= 0) {
    alert('Completá fecha, concepto y monto correctamente');
    return;
  }

  if (idExistente !== null && idExistente !== undefined) {
    const egreso = egresosDB.find(e => e.id === idExistente);
    egreso.fecha = fecha; egreso.categoria = categoria; egreso.concepto = concepto; egreso.comprobante = comprobante; egreso.monto = monto; egreso.moneda = moneda;
    alert('✅ Egreso actualizado');
  } else {
    const nuevoId = egresosDB.length ? Math.max(...egresosDB.map(e => e.id)) + 1 : 1;
    egresosDB.push({ id: nuevoId, fecha, categoria, concepto, comprobante, monto, moneda, registradoPor: tesorero });
    alert('✅ Egreso registrado');
  }

  guardarTodo();
  document.querySelector('.modal-overlay').remove();
  cargarTablaEgresosTesorero();
}

function eliminarEgreso(id) {
  if (!confirm('¿Seguro que querés eliminar este egreso?')) return;
  egresosDB = egresosDB.filter(e => e.id !== id);
  guardarTodo();
  cargarTablaEgresosTesorero();
}

  if (resumenCont) {
    resumenCont.innerHTML = `
      <div style="display:flex; gap:15px; margin-bottom:15px; flex-wrap:wrap;">
        <div class="card" style="flex:1; min-width:150px; text-align:center; margin-bottom:0; border-left-color:#A33;">
          <h3 style="color:#A33;">$${totalEgresosUYU.toLocaleString('es-UY')}</h3>
          <p style="font-size:12px;">Total egresos ($)</p>
        </div>
        ${totalEgresosUSD > 0 ? `
        <div class="card" style="flex:1; min-width:150px; text-align:center; margin-bottom:0; border-left-color:#A33;">
          <h3 style="color:#A33;">US$${totalEgresosUSD.toLocaleString('es-UY')}</h3>
          <p style="font-size:12px;">Total egresos (USD)</p>
        </div>` : ''}
      </div>
    `;
  }

  let html = '';

  if (lista.length === 0) {
    html = `<p style="color: var(--gray); font-size:13px;">No hay egresos registrados todavía</p>`;
  }

  lista.forEach(e => {
    const fechaFormateada = new Date(e.fecha + 'T00:00:00').toLocaleDateString('es-ES');
    const simboloMoneda = e.moneda === 'USD' ? 'US$' : '$';
    const comprobanteTexto = e.comprobante ? e.comprobante : '-';
    html += `
      <div class="egreso-item">
        <div class="egreso-item-header" onclick="toggleEgresoDetalle(${e.id})">

            <span class="egreso-item-monto">${simboloMoneda}${e.monto.toLocaleString('es-UY')}</span>
            <span class="egreso-item-chevron" id="egresoChevron-${e.id}">▾</span>
          </div>
        </div>
        <div class="egreso-item-detalle" id="egresoDetalle-${e.id}" style="display:none;">
          <p>Categoría: <strong>${e.categoria}</strong></p>
          <p>N° de comprobante: <strong>${comprobanteTexto}</strong></p>
          <p>Monto: <strong>${simboloMoneda}${e.monto.toLocaleString('es-UY')}</strong></p>
          <button class="btn-editar" onclick="abrirModalEgreso(${e.id})">Editar</button>
          <button class="btn-baja-rojo" onclick="eliminarEgreso(${e.id})">Eliminar</button>
        </div>
      </div>
    `;
  });

  cont.innerHTML = html;
}

function toggleEgresoDetalle(id) {
  const detalle = document.getElementById(`egresoDetalle-${id}`);
  const chevron = document.getElementById(`egresoChevron-${id}`);
  if (!detalle) return;
  const abierto = detalle.style.display !== 'none';

}

function cargarTablaDeudasTesorero() {
  actualizarMesesEnDeudaAutomatico();
  let html = '';
  let haySocios = false;

  const socios = [];
  for (let user in usuariosDB) {
    const u = usuariosDB[user];
    if (u.rol === 'socio' && u.estado === 'Activo') socios.push({ user, u });
  }
  socios.sort((a, b) => `${a.u.nombre} ${a.u.apellido1 || ''}`.localeCompare(`${b.u.nombre} ${b.u.apellido1 || ''}`, 'es', { sensitivity: 'base' }));

  socios.forEach(({ user, u }) => {
    haySocios = true;
    const causal = tieneCausalPorDeuda(u);
    const estadoIcono = causal ? '🔴' : (u.mesesEnDeuda >= 1 ? '⚠️' : '✅');
    const estadoTexto = causal ? 'Causal por deuda' : (u.mesesEnDeuda >= 1 ? 'En deuda' : 'Al día');

    html += `
      <div class="deuda-item">
        <div class="deuda-item-header" onclick="toggleDeudaDetalle('${user}')">
          <span class="deuda-item-nombre">${u.nombre} ${u.apellido1 || ''}</span>
          <span class="deuda-item-badge">${estadoIcono} ${estadoTexto} <span class="deuda-item-chevron" id="deudaChevron-${user}">▾</span></span>
        </div>
        <div class="deuda-item-detalle" id="deudaDetalle-${user}" style="display:none;">
          <p style="font-size:13px; margin-bottom:4px;">Meses en deuda: <strong>${u.mesesEnDeuda}</strong></p>
          <p style="font-size:13px; margin-bottom:10px;">Avisos enviados: <strong>${(u.historialAvisos || []).length}</strong></p>
          <button class="btn-editar" onclick="abrirModalPago('${user}')">💰 Registrar pago</button>
          <button class="btn-baja-gris" onclick="abrirModalAviso('${user}')">📨 Enviar aviso</button>
          <button class="btn-baja-verde" onclick="abrirModalHistorialSocio('${user}')">📋 Historial</button>
        </div>
      </div>
    `;
  });

  if (!haySocios) html = '<p style="color: var(--gray); font-size:13px;">No hay socios activos</p>';

  document.getElementById('tablaDeudasTesorero').innerHTML = html;
}

function toggleDeudaDetalle(user) {
  const detalle = document.getElementById(`deudaDetalle-${user}`);
  const chevron = document.getElementById(`deudaChevron-${user}`);
  if (!detalle) return;
  const abierto = detalle.style.display !== 'none';

function cargarTablaAlquileresEn(resumenId, tablaId) {
  const hoyStr = new Date().toISOString().split('T')[0];
  const listaOrdenada = alquileresDB.slice().sort((a, b) => (b.fecha || '').localeCompare(a.fecha || ''));

  const totalRecaudado = alquileresDB.filter(r => r.estadoPago === 'Pagado').reduce((sum, r) => sum + (r.montoTotal || 0), 0);
  const pendientes = alquileresDB.filter(r => r.estadoPago !== 'Pagado').length;

  let resumenHtml = `<div style="display:flex; gap:15px; margin-bottom:15px; flex-wrap:wrap;">
    <div class="card" style="flex:1; min-width:150px; text-align:center; margin-bottom:0;"><h3 style="color:var(--navy);">$${totalRecaudado.toFixed(0)}</h3><p style="font-size:12px;">Recaudado (pagados)</p></div>
    <div class="card" style="flex:1; min-width:150px; text-align:center; margin-bottom:0;"><h3 style="color:var(--navy);">${alquileresDB.length}</h3><p style="font-size:12px;">Reservas totales</p></div>
    <div class="card" style="flex:1; min-width:150px; text-align:center; margin-bottom:0;"><h3 style="color:var(--navy);">${pendientes}</h3><p style="font-size:12px;">Pagos pendientes</p></div>
  </div>`;
  document.getElementById(resumenId).innerHTML = resumenHtml;

  let html = `<table><thead><tr><th>Fecha</th><th>Turno</th><th>Solicitante</th><th>Teléfono</th><th>Monto</th><th>Estado de pago</th><th>Acciones</th></tr></thead><tbody>`;

  if (listaOrdenada.length === 0) {
    html += `<tr><td colspan="7" style="color: var(--gray); text-align:center;">No hay reservas cargadas todavía</td></tr>`;
  }

  listaOrdenada.forEach(r => {
    const fechaFormateada = new Date(r.fecha + 'T00:00:00').toLocaleDateString('es-ES');
    const esPasada = r.fecha < hoyStr;
    const estadoBadge = r.estadoPago === 'Pagado' ? '✅ Pagado' : (r.estadoPago === 'Seña' ? '🟡 Seña' : '🔴 Pendiente');
    const origenBadge = r.origen === 'socio' ? ' <span style="font-size:9px; background:var(--gold2); color:white; padding:2px 6px; border-radius:8px;">Desde la app</span>' : '';
    html += `<tr style="${esPasada ? 'opacity:0.6;' : ''}">
      <td><strong>${fechaFormateada}</strong>${esPasada ? ' <span style="font-size:10px; color: var(--gray);">(pasada)</span>' : ''}</td>
      <td data-label="Turno">${r.turnoLabel || '-'}${origenBadge}</td>
      <td>${r.solicitante}</td>
      <td style="white-space:nowrap;">${r.telefono || '-'}</td>
      <td>$${(r.montoTotal || 0).toFixed(0)} <span style="font-size:10px; color: var(--gray);">(incl. $${(r.montoLimpieza || 0).toFixed(0)} limpieza)</span></td>
      <td>${estadoBadge}</td>
      <td>
        <button class="btn-editar" onclick="abrirModalAlquiler(${r.id})">Editar</button>
        <button class="btn-baja-rojo" onclick="eliminarAlquiler(${r.id})">Eliminar</button>
      </td>
    </tr>`;
  });

  html += `</tbody></table>`;
  document.getElementById(tablaId).innerHTML = html;
}

function cargarTablaAlquileres() {

}

function guardarAlquiler(idExistente) {
  const fecha = document.getElementById('alqFecha').value;
  const solicitante = document.getElementById('alqSolicitante').value.trim();
  const telefono = document.getElementById('alqTelefono').value.trim();
  const montoTotal = parseFloat(document.getElementById('alqMontoTotal').value) || 0;
  const montoLimpieza = parseFloat(document.getElementById('alqMontoLimpieza').value) || 0;
  const estadoPago = document.getElementById('alqEstadoPago').value;
  const observaciones = document.getElementById('alqObservaciones').value.trim();
  const tesorero = localStorage.getItem('currentUser');

  if (!fecha || !solicitante) {
    alert('Fecha y solicitante son obligatorios');
    return;
  }

  if (idExistente !== null && idExistente !== undefined) {
    const r = alquileresDB.find(x => x.id === idExistente);
    r.fecha = fecha; r.solicitante = solicitante; r.telefono = telefono;
    r.montoTotal = montoTotal; r.montoLimpieza = montoLimpieza; r.estadoPago = estadoPago;
    r.observaciones = observaciones;
    alert('✅ Reserva actualizada');
  } else {
    const nuevoId = alquileresDB.length ? Math.max(...alquileresDB.map(x => x.id)) + 1 : 1;
    alquileresDB.push({ id: nuevoId, fecha, solicitante, telefono, montoTotal, montoLimpieza, estadoPago, observaciones, registradoPor: tesorero });
    alert('✅ Reserva creada');
  }

  guardarTodo();
  document.querySelector('.modal-overlay').remove();
  cargarTablaAlquileres();
  cargarTablaAlquileresAdmin();
}

function eliminarAlquiler(id) {
  if (!confirm('¿Seguro que querés eliminar esta reserva?')) return;
  alquileresDB = alquileresDB.filter(r => r.id !== id);
  guardarTodo();
  cargarTablaAlquileres();
  cargarTablaAlquileresAdmin();
}

function actualizarSugerenciaPago(usuario) {
  const u = usuariosDB[usuario];
  const mesDesdeVal = document.getElementById('pagoMesDesde').value; // "YYYY-MM"
  const mesHastaVal = document.getElementById('pagoMesHasta').value;
  if (!mesDesdeVal || !mesHastaVal) return;

  const [anioDesde, mesDesde] = mesDesdeVal.split('-').map(Number);
  const [anioHasta, mesHasta] = mesHastaVal.split('-').map(Number);

  const totalMeses = (anioHasta * 12 + (mesHasta - 1)) - (anioDesde * 12 + (mesDesde - 1)) + 1;
  const plan = PLANES_CUOTA[u.planCuota] || PLANES_CUOTA.individual;

  if (totalMeses > 0) {
    document.getElementById('pagoMonto').value = totalMeses * plan.precioMensual;

    const nombreMesDesde = NOMBRES_MESES_ES[mesDesde - 1];
    const nombreMesHasta = NOMBRES_MESES_ES[mesHasta - 1];
    const conceptoSugerido = (mesDesdeVal === mesHastaVal)
      ? `Cuota social - ${capitalizar(nombreMesDesde)} ${anioHasta}`
      : `Cuota social - ${capitalizar(nombreMesDesde)}${anioDesde !== anioHasta ? ' ' + anioDesde : ''} a ${capitalizar(nombreMesHasta)} ${anioHasta}`;
    document.getElementById('pagoConcepto').value = conceptoSugerido;
  }

  const notaDiv = document.getElementById('pagoFamiliaNota');
  if (Array.isArray(u.familiaMiembros) && u.familiaMiembros.length > 0) {
    const nombres = u.familiaMiembros.map(fu => {
      const fam = usuariosDB[fu];
      return fam ? `${fam.nombre} ${fam.apellido1 || ''}`.trim() : fu;
    }).join(', ');
    notaDiv.innerHTML = `<div class="warning-box" style="margin-bottom:15px;">👨‍👩‍👧 Este pago también va a marcar como al día a su grupo familiar: <strong>${nombres}</strong></div>`;
  } else {
    notaDiv.innerHTML = '';
  }
}

function capitalizar(str) {
  return str.charAt(0).toUpperCase() + str.slice(1);
}

function confirmarPago(usuario) {
  const monto = parseFloat(document.getElementById('pagoMonto').value);
  const concepto = document.getElementById('pagoConcepto').value.trim();
  const moneda = document.getElementById('pagoMoneda').value;
  const fecha = document.getElementById('pagoFecha').value;
  const mesDesdeVal = document.getElementById('pagoMesDesde').value;
  const mesHastaVal = document.getElementById('pagoMesHasta').value;
  const tesorero = localStorage.getItem('currentUser');

  if (!monto || monto <= 0 || !concepto || !fecha) {
    alert('Completa monto, concepto y fecha correctamente');
    return;
  }

  const u = usuariosDB[usuario];
  const [anioDesde, mesDesde] = mesDesdeVal ? mesDesdeVal.split('-').map(Number) : [null, null];
  const [anioHasta, mesHasta] = mesHastaVal ? mesHastaVal.split('-').map(Number) : [null, null];

  const pago = {
    fecha, monto, concepto, moneda, registradoPor: tesorero,
    periodoDesdeMes: mesDesde ? mesDesde - 1 : null,
    periodoDesdeAnio: anioDesde,
    periodoHastaMes: mesHasta ? mesHasta - 1 : null,
    periodoHastaAnio: anioHasta
  };
  u.historialPagos.push(pago);

  // Si el socio tiene un grupo familiar, el mismo período queda cubierto para todos
  if (Array.isArray(u.familiaMiembros) && u.familiaMiembros.length > 0) {
    u.familiaMiembros.forEach(fu => {
      const familiar = usuariosDB[fu];
      if (!familiar) return;
      familiar.historialPagos.push({
        fecha, monto: 0, moneda, registradoPor: tesorero,
        concepto: `${concepto} (incluido en el pago familiar de ${u.nombre} ${u.apellido1 || ''})`,
        periodoDesdeMes: mesDesde ? mesDesde - 1 : null,
        periodoDesdeAnio: anioDesde,
        periodoHastaMes: mesHasta ? mesHasta - 1 : null,
        periodoHastaAnio: anioHasta,
        cubiertoPorFamilia: true
      });
      familiar.mesesEnDeuda = 0;
    });
  }

  guardarTodo();

  document.querySelector('.modal-overlay').remove();
  cargarTablaDeudasTesorero();
  mostrarRecibo(usuario, pago);
}

// ===== PROFESOR =====
function cargarPanelProfesor() {
  const usuarioActual = localStorage.getItem('currentUser');
  let html = `<table><thead><tr><th>Actividad</th><th>Día</th><th>Hora</th><th>Cantidad</th><th>Alumnos inscritos</th><th>Acciones</th></tr></thead><tbody>`;
  let hayActividades = false;

  actividadesDB.forEach(act => {
    if (act.profesor === usuarioActual) {
      hayActividades = true;
      const alumnos = act.inscriptos.map(user => usuariosDB[user]?.nombre || user).join(', ');
      const rangoHorario = act.horaFin ? `${act.hora} a ${act.horaFin}` : act.hora;
      html += `<tr>
        <td data-label="Actividad"><strong>${act.titulo}</strong></td>
        <td data-label="Día">${act.dia}</td>
        <td data-label="Hora">${rangoHorario}</td>
        <td data-label="Cantidad" style="text-align:center;"><strong>${act.inscriptos.length}</strong></td>
        <td data-label="Alumnos inscritos">${alumnos || 'Sin inscritos'}</td>
        <td data-label="Acciones">
          <button class="btn-editar" onclick="abrirModalActividadProfesor(${act.id})">Editar</button>
          <button class="btn-baja-rojo" onclick="eliminarActividad(${act.id}); cargarPanelProfesor();">Eliminar</button>
          <button class="btn-baja-verde" onclick="abrirModalRegistroClase(${act.id})">📋 Registrar clase</button>
        </td>
      </tr>`;
    }
  });

  if (!hayActividades) {
    html += `<tr><td colspan="6" style="color: var(--gray); text-align:center;">Todavía no cargaste ninguna actividad. Tocá el botón "+" para agregar la primera.</td></tr>`;
  }

  html += `</tbody></table>`;

  html += `<h3 style="color: var(--navy); margin: 30px 0 15px 0;">📋 Mis registros de clase</h3>`;
  const misRegistros = registrosClaseDB
    .filter(r => r.profesor === usuarioActual)
    .sort((a, b) => (b.fecha || '').localeCompare(a.fecha || ''));

  if (misRegistros.length === 0) {
    html += `<p style="color: var(--gray); font-size:13px;">Todavía no registraste ninguna clase</p>`;
  } else {
    html += `<table><thead><tr><th>Fecha</th><th>Actividad</th><th>Alumnos</th><th>Total cobrado</th><th>Comisión (10%)</th><th>Acciones</th></tr></thead><tbody>`;
    misRegistros.forEach(r => {
      const fechaFormateada = new Date(r.fecha + 'T00:00:00').toLocaleDateString('es-ES');
      const solicitudPendiente = solicitudesCambioClaseDB.find(s => s.registroId === r.id && s.estado === 'Pendiente');
      const accion = solicitudPendiente
        ? `<span style="font-size:11px; color:#B8860B; font-weight:700;">⏳ Pendiente de aprobación</span>`
        : `<button class="btn-baja-gris" onclick="abrirModalSolicitudCambio(${r.id})">Solicitar cambio</button>`;
      html += `<tr>
        <td data-label="Fecha">${fechaFormateada}</td>
        <td data-label="Actividad">${r.actividadTitulo}</td>
        <td data-label="Alumnos">${r.alumnos.length}</td>
        <td data-label="Total cobrado">$${r.totalCobrado.toLocaleString('es-UY')}</td>
        <td data-label="Comisión (10%)"><strong>$${r.comision.toLocaleString('es-UY')}</strong></td>
        <td data-label="Acciones">${accion}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }

  document.getElementById('panelProfesor').innerHTML = html;
}

function abrirModalActividadProfesor(idExistente) {

      <label style="font-size:12px; font-weight:600;">Profesor a cargo</label>

      <input type="text" id="actProfDia" placeholder="Ej: Martes y Jueves" value="${editando ? act.dia : ''}">

      <input type="time" id="actProfHoraFin" value="${editando ? (act.horaFin || '') : ''}">
      <label style="font-size:12px; font-weight:600;">Precio por alumno (para el registro de clases)</label>
      <input type="number" id="actProfPrecioAlumno" value="${editando ? (act.precioPorAlumno ?? 250) : 250}" min="0">
      <label style="font-size:12px; font-weight:600;">Descripción</label>
      <textarea id="actProfDescripcion" placeholder="Descripción de la actividad">${editando ? act.descripcion : ''}</textarea>
      <button class="btn" onclick="guardarActividadProfesor(${editando ? idExistente : 'null'})">Guardar Actividad</button>
      <button class="btn" style="background:#6c757d; margin-top:10px;" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
    </div>

function guardarActividadProfesor(idExistente) {
  const usuarioActual = localStorage.getItem('currentUser');
  const titulo = document.getElementById('actProfTitulo').value.trim();
  const dia = document.getElementById('actProfDia').value.trim();
  const hora = document.getElementById('actProfHora').value;
  const horaFin = document.getElementById('actProfHoraFin').value;
  const precioPorAlumno = parseFloat(document.getElementById('actProfPrecioAlumno').value) || 0;
  const descripcion = document.getElementById('actProfDescripcion').value.trim();

  if (!titulo || !dia) {
    alert('Título y día son obligatorios');
    return;
  }

  const idParaExcluir = (idExistente !== null && idExistente !== undefined) ? idExistente : null;
  const conflicto = buscarConflictoHorarioActividad(dia, hora, horaFin, idParaExcluir);
  if (conflicto) {
    alert(mensajeConflictoHorario(conflicto));
    return;
  }

  if (idExistente !== null && idExistente !== undefined) {
    const act = actividadesDB.find(a => a.id === idExistente);
    if (act.profesor !== usuarioActual) {
      alert('Solo podés editar tus propias actividades');
      return;
    }
    act.titulo = titulo;
    act.dia = dia;
    act.hora = hora;
    act.horaFin = horaFin;
    act.descripcion = descripcion;
    act.precioPorAlumno = precioPorAlumno;
    alert('✅ Actividad actualizada');
  } else {
    const nuevoId = actividadesDB.length ? Math.max(...actividadesDB.map(a => a.id)) + 1 : 1;
    actividadesDB.push({ id: nuevoId, titulo, profesor: usuarioActual, descripcion, dia, hora, horaFin, precioPorAlumno, inscriptos: [] });
    alert('✅ Actividad creada');
  }

  guardarTodo();
  document.querySelector('.modal-overlay').remove();
  cargarPanelProfesor();
}

// ===== PROFESOR: registro de asistencia/cobro por clase =====
let tempAlumnosRegistro = [];
let actividadRegistroActual = null;

function abrirModalRegistroClase(actividadId) {
  const act = actividadesDB.find(a => a.id === actividadId);
  if (!act) return;
  actividadRegistroActual = actividadId;
  tempAlumnosRegistro = [];

  const hoy = new Date().toISOString().split('T')[0];

  let opcionesSocios = '<option value="">-- Elegir socio inscripto --</option>';
  act.inscriptos.forEach(user => {
    const u = usuariosDB[user];
    if (u) opcionesSocios += `<option value="${user}">${u.nombre} ${u.apellido1 || ''}</option>`;
  });

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-content">
      <h2>📋 Registrar clase — ${act.titulo}</h2>
      <label style="font-size:12px; font-weight:600;">Fecha de la clase</label>
      <input type="date" id="regFecha" value="${hoy}">

      <label style="font-size:12px; font-weight:600;">Agregar socio inscripto</label>
      <div class="reg-add-row">
        <select id="regSocioSelect">${opcionesSocios}</select>
        <button class="btn-small" style="background:var(--navy2); color:white; border:none; border-radius:5px; cursor:pointer;" onclick="agregarAlumnoRegistro('socio')">Agregar</button>
      </div>

      <label style="font-size:12px; font-weight:600;">Agregar alumno no socio</label>
      <div class="reg-add-row">
        <input type="text" id="regNoSocioNombre" placeholder="Nombre del alumno">
        <button class="btn-small" style="background:var(--gold2); color:white; border:none; border-radius:5px; cursor:pointer;" onclick="agregarAlumnoRegistro('nosocio')">Agregar</button>
      </div>

      <div id="regListaAlumnos"></div>

      <div class="reg-resumen-box" id="regResumen"></div>

      <button class="btn" onclick="guardarRegistroClase()">Guardar registro</button>
      <button class="btn" style="background:#6c757d; margin-top:10px;" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
    </div>
  `;
  document.body.appendChild(overlay);
  dibujarListaAlumnosRegistro();
}

function agregarAlumnoRegistro(tipo) {
  if (tipo === 'socio') {
    const select = document.getElementById('regSocioSelect');
    const usuario = select.value;
    if (!usuario) { alert('Elegí un socio de la lista'); return; }
    const u = usuariosDB[usuario];
    tempAlumnosRegistro.push({ nombre: `${u.nombre} ${u.apellido1 || ''}`.trim(), esSocio: true, usuario });
    select.value = '';
  } else {
    const input = document.getElementById('regNoSocioNombre');
    const nombre = input.value.trim();
    if (!nombre) { alert('Escribí el nombre del alumno'); return; }
    tempAlumnosRegistro.push({ nombre, esSocio: false, usuario: null });
    input.value = '';
  }
  dibujarListaAlumnosRegistro();
}

function quitarAlumnoRegistro(idx) {
  tempAlumnosRegistro.splice(idx, 1);
  dibujarListaAlumnosRegistro();
}

function dibujarListaAlumnosRegistro() {
  const cont = document.getElementById('regListaAlumnos');
  const resumen = document.getElementById('regResumen');
  if (!cont || !resumen) return;

  const act = actividadesDB.find(a => a.id === actividadRegistroActual);
  const precio = act.precioPorAlumno ?? 250;

  if (tempAlumnosRegistro.length === 0) {
    cont.innerHTML = `<p style="color: var(--gray); font-size:12.5px; margin-bottom:10px;">Todavía no agregaste ningún alumno</p>`;
  } else {
    let html = '';
    tempAlumnosRegistro.forEach((al, idx) => {
      html += `<div class="reg-alumno-item">
        <span>${al.nombre} <span class="reg-alumno-tipo">${al.esSocio ? '(socio)' : '(no socio)'}</span></span>
        <button onclick="quitarAlumnoRegistro(${idx})">✕</button>
      </div>`;
    });
    cont.innerHTML = html;
  }

  const total = tempAlumnosRegistro.length * precio;
  const comision = Math.round(total * 0.10);

  resumen.innerHTML = `
    <div>Alumnos: <strong>${tempAlumnosRegistro.length}</strong> × $${precio.toLocaleString('es-UY')} c/u</div>
    <div class="reg-total">Total cobrado: $${total.toLocaleString('es-UY')}</div>
    <div>Comisión a pagar a la Asociación (10%): <strong>$${comision.toLocaleString('es-UY')}</strong></div>
  `;
}

function guardarRegistroClase() {
  const fecha = document.getElementById('regFecha').value;
  if (!fecha) { alert('Elegí la fecha de la clase'); return; }
  if (tempAlumnosRegistro.length === 0) { alert('Agregá al menos un alumno'); return; }

  const act = actividadesDB.find(a => a.id === actividadRegistroActual);
  const precio = act.precioPorAlumno ?? 250;
  const total = tempAlumnosRegistro.length * precio;
  const comision = Math.round(total * 0.10);
  const usuarioActual = localStorage.getItem('currentUser');

  const nuevoId = registrosClaseDB.length ? Math.max(...registrosClaseDB.map(r => r.id)) + 1 : 1;
  registrosClaseDB.push({
    id: nuevoId,
    actividadId: act.id,
    actividadTitulo: act.titulo,
    profesor: usuarioActual,
    fecha,
    alumnos: tempAlumnosRegistro,
    precioPorAlumno: precio,
    totalCobrado: total,
    comision,
    registradoEn: new Date().toISOString()
  });

  guardarTodo();
  document.querySelector('.modal-overlay').remove();
  cargarPanelProfesor();
  alert(`✅ Clase registrada.\n\nTotal cobrado: $${total.toLocaleString('es-UY')}\nComisión a pagar: $${comision.toLocaleString('es-UY')}`);
}

function eliminarRegistroClase(id) {
  if (!confirm('¿Seguro que querés eliminar este registro?')) return;
  registrosClaseDB = registrosClaseDB.filter(r => r.id !== id);
  guardarTodo();
  cargarPanelProfesor();

// ===== PROFESOR: solicitar cambio/anulación de un registro ya guardado (requiere aprobación del admin) =====
const MOTIVOS_BAJA_ALUMNO = [
  'El alumno no asistió (error de carga)',
  'El alumno canceló antes de la clase',
  'Error en el nombre o el monto cargado',
  'La clase no se dictó ese día',
  'Otro motivo'
];

function abrirModalSolicitudCambio(registroId) {
  const registro = registrosClaseDB.find(r => r.id === registroId);
  if (!registro) return;

  let opcionesAlumnos = '';
  registro.alumnos.forEach((al, idx) => {
    opcionesAlumnos += `<option value="${idx}">${al.nombre}${al.esSocio ? '' : ' (no socio)'}</option>`;
  });

  let opcionesMotivos = '';
  MOTIVOS_BAJA_ALUMNO.forEach(m => { opcionesMotivos += `<option value="${m}">${m}</option>`; });

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-content">
      <h2>✏️ Solicitar cambio de registro</h2>
      <p style="font-size:12.5px; color:#666; margin-bottom:15px;">Esta solicitud queda pendiente hasta que el administrador la apruebe. El registro original no se modifica todavía.</p>

      <label style="font-size:12px; font-weight:600;">¿Qué querés hacer?</label>
      <select id="solTipo" onchange="document.getElementById('solAlumnoWrapper').style.display = this.value === 'quitar_alumno' ? 'block' : 'none';">
        <option value="quitar_alumno">Quitar un alumno de este registro</option>
        <option value="anular_registro">Anular el registro completo (la clase no se dio)</option>
      </select>

      <div id="solAlumnoWrapper">
        <label style="font-size:12px; font-weight:600;">Alumno a quitar</label>
        <select id="solAlumnoIdx">${opcionesAlumnos}</select>
      </div>

      <label style="font-size:12px; font-weight:600;">Motivo</label>
      <select id="solMotivo">${opcionesMotivos}</select>

      <label style="font-size:12px; font-weight:600;">Detalle (opcional, obligatorio si elegís "Otro motivo")</label>
      <textarea id="solDetalle" placeholder="Contale al administrador qué pasó..."></textarea>

      <button class="btn" onclick="guardarSolicitudCambio(${registroId})">Enviar solicitud</button>
      <button class="btn" style="background:#6c757d; margin-top:10px;" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
    </div>
  `;
  document.body.appendChild(overlay);
}

function guardarSolicitudCambio(registroId) {
  const registro = registrosClaseDB.find(r => r.id === registroId);
  const tipo = document.getElementById('solTipo').value;
  const motivo = document.getElementById('solMotivo').value;
  const detalle = document.getElementById('solDetalle').value.trim();
  const usuarioActual = localStorage.getItem('currentUser');

  if (motivo === 'Otro motivo' && !detalle) {
    alert('Contanos el detalle si elegís "Otro motivo"');
    return;
  }

  let alumnoIndex = null;
  let alumnoNombre = null;
  if (tipo === 'quitar_alumno') {
    alumnoIndex = parseInt(document.getElementById('solAlumnoIdx').value);
    alumnoNombre = registro.alumnos[alumnoIndex]?.nombre || '';
  }

  const nuevoId = solicitudesCambioClaseDB.length ? Math.max(...solicitudesCambioClaseDB.map(s => s.id)) + 1 : 1;
  solicitudesCambioClaseDB.push({
    id: nuevoId,
    registroId,
    actividadTitulo: registro.actividadTitulo,
    fechaClase: registro.fecha,
    profesor: usuarioActual,
    tipo,
    alumnoIndex,
    alumnoNombre,
    motivo,
    detalle,
    estado: 'Pendiente',
    fechaSolicitud: new Date().toISOString()
  });

  guardarTodo();
  document.querySelector('.modal-overlay').remove();
  cargarPanelProfesor();
  alert('✅ Solicitud enviada. Quedará pendiente hasta que el administrador la revise.');
}

function aprobarSolicitudCambio(solicitudId) {
  const s = solicitudesCambioClaseDB.find(x => x.id === solicitudId);
  if (!s) return;
  if (!confirm('¿Aprobar esta solicitud? Se va a aplicar el cambio sobre el registro.')) return;

  const registro = registrosClaseDB.find(r => r.id === s.registroId);
  if (registro) {
    if (s.tipo === 'anular_registro') {
      registrosClaseDB = registrosClaseDB.filter(r => r.id !== s.registroId);
    } else if (s.tipo === 'quitar_alumno') {
      registro.alumnos.splice(s.alumnoIndex, 1);
      registro.totalCobrado = registro.alumnos.length * registro.precioPorAlumno;
      registro.comision = Math.round(registro.totalCobrado * 0.10);
    }
  }

  s.estado = 'Aprobado';
  s.fechaResolucion = new Date().toISOString();
  s.resueltoPor = localStorage.getItem('currentUser');

  guardarTodo();
  cargarSolicitudesCambioAdmin();
  if (document.getElementById('tablaRegistrosClaseTesorero')) cargarTablaRegistrosClaseTesorero();
  alert('✅ Solicitud aprobada y cambio aplicado.');
}

function rechazarSolicitudCambio(solicitudId) {
  const s = solicitudesCambioClaseDB.find(x => x.id === solicitudId);
  if (!s) return;
  if (!confirm('¿Rechazar esta solicitud? El registro queda tal cual estaba.')) return;

  s.estado = 'Rechazado';
  s.fechaResolucion = new Date().toISOString();
  s.resueltoPor = localStorage.getItem('currentUser');

  guardarTodo();
  cargarSolicitudesCambioAdmin();
  alert('❌ Solicitud rechazada.');
}
